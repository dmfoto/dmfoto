<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMFOTO — Fotografia Esportiva</title>
  <meta name="description" content="DMFOTO — Fotografia esportiva profissional. Encontre as fotos do seu evento e compre com segurança na plataforma parceira." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700;800&family=Archivo:wght@400;600;700;800&family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
/* ─── CSS Variables ─────────────────────────────────────────── */
:root {
  --accent: #e0e0e0;
  --accent-dim: rgba(220,220,220,0.10);
  --accent-glow: rgba(200,200,200,0.20);
  --accent-text: #ffffff;
  --bg-primary: #080808;
  --bg-surface: #111111;
  --bg-surface-2: #181818;
  --bg-surface-3: #222222;
  --border: #2a2a2a;
  --border-light: #383838;
  --text-primary: #f0f0f0;
  --text-secondary: #888888;
  --text-muted: #444444;
  --font-sans: 'Plus Jakarta Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-condensed: 'Barlow Condensed', sans-serif;
  --radius: 18px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --nav-h: 68px;
  --section-gap: 100px;
  --container: 1200px;
}

/* ─── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
img, svg { display: block; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* ─── Utilities ─────────────────────────────────────────────── */
.container { width: 100%; padding: 0 24px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 0;
  font-weight: 700; font-size: 0.95rem; line-height: 1;
  letter-spacing: 0.06em; text-transform: uppercase;
  transition: all 0.2s ease; white-space: nowrap;
}
.btn-primary { background: #fff; color: #080808; font-weight: 800; box-shadow: 0 0 24px rgba(255,255,255,0.12); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 24px rgba(255,255,255,0.18); filter: brightness(0.95); }
.btn-outline { background: transparent; color: var(--text-primary); border: 1.5px solid var(--border-light); font-weight: 700; }
.btn-outline:hover { border-color: var(--accent); color: var(--accent-text); transform: translateY(-2px); }
.btn-ghost { color: var(--text-secondary); padding: 12px 16px; }
.btn-ghost:hover { color: var(--text-primary); }
.btn-sm { padding: 8px 16px; font-size: 0.85rem; }
.btn-lg { padding: 16px 32px; font-size: 1.05rem; }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 99px;
  font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.badge-available { background: rgba(255,255,255,0.08); color: #d4d4d4; border: 1px solid rgba(255,255,255,0.15); }
.badge-editing   { background: rgba(255,255,255,0.05); color: #999999; border: 1px solid rgba(255,255,255,0.10); }
.badge-soon      { background: rgba(255,255,255,0.04); color: #666666; border: 1px solid rgba(255,255,255,0.08); }
.badge-accent    { background: var(--accent-dim); color: var(--accent-text); border: 1px solid rgba(255,255,255,0.15); }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: var(--radius-xs);
  font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
  background: rgba(255,255,255,0.05); color: var(--text-secondary);
  border: 1px solid var(--border);
}

.section-label {
  font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-secondary); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::before {
  content: ''; display: block; width: 20px; height: 2px;
  background: var(--border-light); border-radius: 2px;
}
h1,h2,h3,h4 { line-height: 1.15; font-weight: 800; }

/* ─── Placeholder Image ──────────────────────────────────────── */
.placeholder-img { position: relative; overflow: hidden; background: var(--bg-surface-2); }
.placeholder-img::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(255,255,255,0.018) 18px,rgba(255,255,255,0.018) 36px);
}
.placeholder-img .ph-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(135deg,var(--sport-color,#3b82f6) 0%,transparent 70%);
  opacity: 0.22;
}
.placeholder-img .ph-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.placeholder-img .ph-icon { opacity: 0.35; }
.placeholder-img .ph-label {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-secondary); opacity: 0.6;
}

/* ─── Photo Gallery (HomePage featured section) ─────────────── */
.photo-gallery-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px;
}
.photo-placeholder {
  aspect-ratio: 4/5; background: var(--bg-surface-2);
  border: 1.5px dashed var(--border-light); border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; cursor: pointer; transition: all 0.2s; color: var(--text-muted);
}
.photo-placeholder:hover { border-color: var(--accent); background: var(--accent-dim); color: var(--accent-text); }
.photo-placeholder .ph-upload-label {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
}

/* ─── Navbar ─────────────────────────────────────────────────── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h); background: rgba(6,8,13,0.92);
  backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; transition: background 0.3s;
}
.navbar .container { display: flex; align-items: center; gap: 0; position: relative; justify-content: space-between; }
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-condensed); font-style: italic; font-weight: 900;
  font-size: 1.5rem; letter-spacing: 0.02em; text-transform: uppercase;
  white-space: nowrap; color: var(--text-primary);
}
.nav-logo .logo-dot { color: var(--accent); }
.nav-logo .logo-icon {
  width: 34px; height: 34px; border-radius: 6px;
  background: var(--accent-dim); border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
}
.nav-links { display: flex; align-items: center; gap: 4px; position: absolute; left: 50%; transform: translateX(-50%); }
.nav-link {
  padding: 8px 14px; border-radius: 0;
  font-size: 0.82rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-secondary); transition: all 0.15s;
}
.nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.nav-link.active { color: var(--accent-text); background: var(--accent-dim); }
.nav-cta { margin-left: auto; }
.nav-cta .btn { border-radius: 0; }
.nav-hamburger { display: none; padding: 8px; border-radius: 0; color: var(--text-primary); margin-left: auto; }
.mobile-menu {
  display: none; position: fixed; top: var(--nav-h); left: 0; right: 0;
  background: var(--bg-surface); border-bottom: 1px solid var(--border);
  z-index: 99; padding: 16px 24px 20px; flex-direction: column; gap: 4px;
}
.mobile-menu.open { display: flex; }
.mobile-menu .nav-link { padding: 12px 14px; width: 100%; }
.mobile-menu .btn { width: 100%; justify-content: center; margin-top: 8px; }

/* ─── Hero ───────────────────────────────────────────────────── */
/* ─── Ticker ─────────────────────────────────────────────────── */
.events-ticker { display: flex; align-items: center; height: 36px; background: var(--bg-surface); border-bottom: 1px solid var(--border); overflow: hidden; position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 99; }
.ticker-label { padding: 0 16px; font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); white-space: nowrap; border-right: 1px solid var(--border); height: 100%; display: flex; align-items: center; flex-shrink: 0; }
.ticker-track-wrap { overflow: hidden; flex: 1; height: 100%; display: flex; align-items: center; }
.ticker-track { display: flex; gap: 40px; animation: ticker-scroll 30s linear infinite; white-space: nowrap; }
.ticker-item { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-secondary); letter-spacing: 0.04em; }
@keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ─── Hero ───────────────────────────────────────────────────── */
.hero { min-height: 100vh; display: block; padding-top: var(--nav-h); position: relative; overflow: hidden; }
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 60% 40%,rgba(255,255,255,0.03) 0%,transparent 60%),
              radial-gradient(ellipse 50% 40% at 20% 80%,rgba(255,255,255,0.02) 0%,transparent 50%);
}
.hero-grid-overlay {
  position: absolute; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(30,39,56,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(30,39,56,0.4) 1px,transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center,black 30%,transparent 70%);
}
.hero-pitch-lines {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.35;
  mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 20%, transparent 70%);
}
/* Hero layout */
.hero-two-col {
  display: flex;
  align-items: center;
  min-height: calc(100vh - var(--nav-h));
  width: 100%;
  position: relative; z-index: 1;
  padding: 0 24px;
}
.hero-left-col {
  max-width: 720px;
  padding: 80px 0;
}
.hero .container { position: relative; z-index: 1; }
.hero-inner { max-width: 700px; padding: 80px 0; margin: 0; }
.hero-inner.center { max-width: 860px; margin: 0 auto; text-align: center; }
.hero-inner.center .hero-actions { justify-content: center; }

/* Score board */
.hero-scoreboard {
  display: inline-flex; margin-bottom: 24px; overflow: hidden;
  border: 1px solid var(--border); border-radius: 0;
}
.hero-scoreboard .sb-seg {
  padding: 5px 14px; font-family: var(--font-mono); font-size: 0.65rem;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(0,0,0,0.6); color: var(--text-muted);
  border-right: 1px solid var(--border);
}
.hero-scoreboard .sb-seg:last-child { border-right: none; }
.hero-scoreboard .sb-seg.accent { background: #fff; color: #080808; }

/* H1 Pitch Side */
.hero h1 {
  font-family: var(--font-condensed); font-style: italic; font-weight: 900;
  font-size: clamp(4rem,8vw,7.5rem); letter-spacing: -0.01em;
  line-height: 0.9; text-transform: uppercase; margin-bottom: 24px;
}
.hero h1 .accent { color: var(--accent); }
.hero h1 .outline {
  color: transparent;
  -webkit-text-stroke: 2px #fff;
  text-stroke: 2px #fff;
}
.hero-sub { font-size: 1.1rem; color: var(--text-secondary); max-width: 480px; margin-bottom: 36px; line-height: 1.65; }
.hero-inner.center .hero-sub { margin: 0 auto 36px; }
.hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 0; }

/* Stats bar — grid 4 colunas */
.hero-stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 0; overflow: hidden;
  margin-top: 48px;
}
.hero-stat { padding: 28px 24px; text-align: center; border-right: 1px solid var(--border); }
.hero-stat:last-child { border-right: none; }
.hero-stat .stat-val {
  font-family: var(--font-condensed); font-style: italic; font-weight: 900;
  font-size: 2.6rem; color: var(--text-primary); line-height: 1; margin-bottom: 6px;
}
.hero-stat .stat-label { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }

/* ─── Sections ──────────────────────────────────────────────── */
.section { padding: var(--section-gap) 0; }
.section-header { margin-bottom: 48px; }
.section-header h2 {
  font-family: var(--font-condensed); font-style: italic; font-weight: 900;
  font-size: clamp(2.2rem,4vw,3.4rem); letter-spacing: -0.01em;
  text-transform: uppercase;
}
.section-header p { color: var(--text-secondary); margin-top: 12px; font-size: 1.05rem; max-width: 540px; }

.cta-strip {
  background: var(--bg-surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 40px 48px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;
}
.cta-strip h2 { font-size: clamp(1.4rem,2.5vw,2rem); letter-spacing: -0.03em; max-width: 480px; }
.cta-strip p { color: var(--text-secondary); margin-top: 8px; max-width: 420px; font-size: 0.95rem; }

/* ─── Event Cards (novo design) ────────────────────────────── */
.events-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(340px,1fr)); gap: 20px; }
.event-card {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  transition: transform 0.2s,border-color 0.2s,box-shadow 0.2s; display: flex; flex-direction: column;
  position: relative;
}
.event-card::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: #fff; transform: scaleY(0); transition: transform 0.2s;
  transform-origin: bottom; z-index: 2;
}
.event-card:hover { transform: translateY(-4px); border-color: var(--border-light); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
.event-card:hover::after { transform: scaleY(1); }
.event-card .tag { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
.event-card-cover { position: relative; aspect-ratio: 16/9; overflow: hidden; }
.event-card-cover .placeholder-img { width: 100%; height: 100%; }
.event-card-cover .card-tags { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
.event-card-cover .card-status { position: absolute; top: 12px; right: 12px; }

/* Botão de visualização prominente */
.event-card-view-link {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: #ffffff; color: #080808;
  padding: 14px 20px; font-weight: 800; font-size: 0.85rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  box-shadow: none;
  text-decoration: none; transition: all 0.2s; cursor: pointer;
  border: none; width: 100%; font-family: inherit;
}
.event-card-view-link:hover { background: #e8e8e8; }

.event-card-notify-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: transparent; color: var(--text-secondary);
  padding: 12px 20px; font-weight: 600; font-size: 0.85rem;
  border-top: 1px solid var(--border); border-bottom: none; border-left: none; border-right: none;
  width: 100%; font-family: inherit; transition: all 0.2s;
}
.event-card-notify-btn:hover { background: var(--bg-surface-2); color: var(--text-primary); }

.event-card-body { padding: 16px 20px 20px; flex: 1; display: flex; flex-direction: column; }
.event-card-title { font-size: 1rem; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
.event-card-info { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.event-card-info-row {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted);
}
.event-card-info-row .count { color: var(--accent-text); font-weight: 700; }

/* Grade de 6 fotos preview */
.event-card-photo-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-top: 4px;
}
.event-card-photo-cell {
  aspect-ratio: 4/5; background: var(--bg-surface-3);
  border-radius: var(--radius-xs); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); opacity: 0.5;
}

/* ─── Events Page ─────────────────────────────────────────────── */
.events-header { padding: calc(var(--nav-h) + 48px) 0 32px; }
.events-header h1 { font-size: clamp(2rem,4vw,3.2rem); letter-spacing: -0.04em; margin-bottom: 8px; }
.search-bar {
  display: flex; align-items: center; gap: 12px; background: var(--bg-surface);
  border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 0 16px;
  transition: border-color 0.2s; margin-bottom: 16px;
}
.search-bar:focus-within { border-color: var(--accent); }
.search-bar input { flex: 1; background: none; border: none; outline: none; color: var(--text-primary); font-size: 0.95rem; padding: 14px 0; }
.search-bar input::placeholder { color: var(--text-muted); }
.search-bar .search-icon { color: var(--text-muted); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.chip {
  padding: 6px 14px; border-radius: 99px; font-family: var(--font-mono); font-size: 0.74rem; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; border: 1.5px solid var(--border);
  color: var(--text-secondary); background: transparent; transition: all 0.15s; white-space: nowrap;
}
.chip:hover { border-color: var(--border-light); color: var(--text-primary); }
.chip.active { border-color: var(--accent); color: var(--accent-text); background: var(--accent-dim); }
.empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 8px; }

/* ─── Modal ───────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(6,8,13,0.88);
  backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
  padding: 24px; animation: fadeIn 0.18s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.modal-box {
  background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius);
  width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6); animation: slideUp 0.22s ease;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.modal-box::-webkit-scrollbar { width: 6px; }
.modal-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.modal-header { position: relative; background: var(--bg-surface-2); border-bottom: 1px solid var(--border); overflow: hidden; }
.modal-cover { aspect-ratio: 16/7; position: relative; }
.modal-cover .placeholder-img { width: 100%; height: 100%; }
.modal-header-info { padding: 20px 24px; display: flex; align-items: flex-start; gap: 14px; }
.modal-close {
  position: absolute; top: 14px; right: 14px; z-index: 10; width: 32px; height: 32px; border-radius: 99px;
  background: rgba(6,8,13,0.7); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.modal-close:hover { background: rgba(239,68,68,0.2); color: #f87171; }
.modal-body { padding: 24px; }
.handoff {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  background: var(--bg-surface-3); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 18px 24px; margin-bottom: 20px;
}
.handoff-brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 0.95rem; }
.handoff-brand.ours { color: var(--accent-text); }
.handoff-brand.theirs { color: var(--text-primary); }
.handoff-connector { flex: 1; height: 1px; background: linear-gradient(90deg,var(--accent),var(--border)); max-width: 60px; }
.modal-section-title { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; margin-top: 20px; }
.modal-text { font-size: 0.92rem; color: var(--text-secondary); line-height: 1.65; margin-bottom: 20px; }
.bib-input-wrap { position: relative; margin-bottom: 24px; }
.bib-input-wrap input {
  width: 100%; background: var(--bg-surface-3); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 13px 48px 13px 16px; color: var(--text-primary); font-family: var(--font-mono);
  font-size: 1.1rem; letter-spacing: 0.1em; outline: none; transition: border-color 0.2s;
}
.bib-input-wrap input:focus { border-color: var(--accent); }
.bib-input-wrap .bib-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
.trust-badges { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
.trust-badge {
  display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);
  background: var(--bg-surface-3); border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 6px 10px;
}
.trust-badge svg { color: var(--accent); }
.modal-footer { padding: 20px 24px; border-top: 1px solid var(--border); background: var(--bg-surface-2); }
.modal-footer .btn { width: 100%; justify-content: center; }
.btn-spinner { display: flex; align-items: center; gap: 10px; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.notify-form { display: flex; flex-direction: column; gap: 12px; }
.notify-form input { width: 100%; background: var(--bg-surface-3); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; color: var(--text-primary); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
.notify-form input:focus { border-color: var(--accent); }
.success-state { text-align: center; padding: 32px 24px; }
.success-state .success-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(34,197,94,0.15); border: 2px solid rgba(34,197,94,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: #86efac; }
.success-state h3 { font-size: 1.1rem; margin-bottom: 8px; }
.success-state p { color: var(--text-secondary); font-size: 0.9rem; }

/* ─── Portfolio ──────────────────────────────────────────────── */
.portfolio-header { padding: calc(var(--nav-h) + 48px) 0 32px; }
.portfolio-header h1 { font-size: clamp(2rem,4vw,3.2rem); letter-spacing: -0.04em; margin-bottom: 8px; }
.masonry-grid { columns: 3 260px; column-gap: 16px; }
.masonry-item { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; position: relative; transition: transform 0.2s,box-shadow 0.2s; }
.masonry-item:hover { transform: scale(1.015); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.masonry-item .placeholder-img { width: 100%; }
.masonry-item .item-overlay { position: absolute; inset: 0; background: linear-gradient(to top,rgba(6,8,13,0.85) 0%,transparent 50%); opacity: 0; transition: opacity 0.2s; display: flex; align-items: flex-end; padding: 16px; }
.masonry-item:hover .item-overlay { opacity: 1; }
.item-overlay-content { display: flex; flex-direction: column; gap: 4px; }
.item-overlay-content .item-title { font-size: 0.9rem; font-weight: 700; line-height: 1.3; }
.item-overlay-content .item-sport { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }

/* Botão de edição no hover do portfólio */
.item-edit-btn {
  position: absolute; top: 8px; right: 8px; z-index: 10;
  width: 30px; height: 30px; border-radius: 7px;
  background: rgba(6,8,13,0.75); color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; opacity: 0; transition: opacity 0.2s, background 0.15s;
  border: 1px solid var(--border-light);
}
.masonry-item:hover .item-edit-btn { opacity: 1; }
.item-edit-btn:hover { background: var(--accent-dim); color: var(--accent-text); }
.masonry-item:hover .item-delete-btn { opacity: 1 !important; }

/* Lightbox */
.lightbox { position: fixed; inset: 0; z-index: 300; background: rgba(6,8,13,0.97); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; }
.lightbox-img { max-width: 90vw; max-height: 85vh; border-radius: var(--radius-sm); overflow: hidden; }
.lightbox-img .placeholder-img { width: 100%; height: 100%; min-width: 560px; max-width: 860px; }
.lightbox-close { position: fixed; top: 20px; right: 24px; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); color: var(--text-primary); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.lightbox-close:hover { background: rgba(239,68,68,0.2); color: #f87171; }
.lightbox-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.08); color: var(--text-primary); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.lightbox-nav:hover { background: rgba(255,255,255,0.15); }
.lightbox-nav.prev { left: 20px; }
.lightbox-nav.next { right: 20px; }
.lightbox-info { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(6,8,13,0.8); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 20px; display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; }
.lightbox-info .lb-title { color: var(--text-primary); font-weight: 600; }
.lightbox-counter { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }

/* ─── About ──────────────────────────────────────────────────── */
.about-header { padding: calc(var(--nav-h) + 48px) 0 32px; }
.about-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; padding-bottom: 64px; }
.about-photo { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.about-content h1 { font-size: clamp(1.8rem,3.5vw,3rem); letter-spacing: -0.04em; margin-bottom: 20px; }
.about-content p { color: var(--text-secondary); line-height: 1.75; margin-bottom: 16px; }
.values-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; margin-top: 32px; }
.value-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; transition: border-color 0.2s; }
.value-card:hover { border-color: var(--border-light); }
.value-card .value-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--accent-dim); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; color: var(--accent); margin-bottom: 12px; }
.value-card h4 { font-size: 0.95rem; margin-bottom: 4px; }
.value-card p { font-size: 0.85rem; color: var(--text-secondary); }

/* ─── Hire/Contato ───────────────────────────────────────────── */
.hire-header { padding: calc(var(--nav-h) + 48px) 0 32px; }
.hire-header h1 { font-size: clamp(2rem,4vw,3.2rem); letter-spacing: -0.04em; margin-bottom: 8px; }
.hire-layout { display: grid; grid-template-columns: 360px 1fr; gap: 48px; align-items: start; }
.hire-sidebar { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; position: sticky; top: calc(var(--nav-h) + 24px); }
.hire-sidebar h3 { font-size: 1rem; margin-bottom: 20px; }
.contact-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.contact-item:last-child { border-bottom: none; }
.contact-item .ci-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--accent-dim); border: 1px solid rgba(255,255,255,0.10); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent); }
.contact-item .ci-label { font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
.contact-item .ci-value { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
.includes-list { list-style: none; margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.includes-list li { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--text-secondary); }
.includes-list li svg { color: var(--accent); flex-shrink: 0; }
.hire-form { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }
.hire-form h2 { font-size: 1.4rem; margin-bottom: 24px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-group label { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
.form-group input, .form-group select, .form-group textarea { background: var(--bg-surface-3); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; color: var(--text-primary); font-size: 0.95rem; outline: none; transition: border-color 0.2s; width: 100%; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group input.error, .form-group select.error, .form-group textarea.error { border-color: #ef4444; }
.form-group select { appearance: none; cursor: pointer; }
.form-group textarea { resize: vertical; min-height: 120px; }
.form-group .error-msg { font-size: 0.78rem; color: #f87171; margin-top: 2px; }
.form-note { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 20px; }

/* ─── Footer ─────────────────────────────────────────────────── */
footer { background: var(--bg-surface); border-top: 1px solid var(--border); padding: 56px 0 32px; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 40px; }
.footer-brand p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.65; max-width: 280px; }
.footer-partner-tag { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; margin-bottom: 12px; }
.footer-col h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 14px; }
.footer-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.footer-links li a { font-size: 0.88rem; color: var(--text-secondary); transition: color 0.15s; }
.footer-links li a:hover { color: var(--accent-text); }
.footer-note { font-size: 0.78rem; color: var(--text-muted); background: var(--bg-surface-2); border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 10px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
.footer-sport-bar { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); flex-wrap: wrap; }
.fsb-sep { color: var(--border-light); }
.footer-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); flex-wrap: wrap; gap: 12px; }
.social-links { display: flex; gap: 8px; }
.social-link { width: 34px; height: 34px; border-radius: var(--radius-xs); background: var(--bg-surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.15s; }
.social-link:hover { border-color: var(--border-light); color: var(--accent-text); }

/* ─── Tweaks Panel ─────────────────────────────────────────────── */
.tweaks-toggle { position: fixed; bottom: 24px; right: 24px; z-index: 150; width: 48px; height: 48px; border-radius: 50%; background: var(--bg-surface); border: 1.5px solid var(--border); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: all 0.2s; }
.tweaks-toggle:hover, .tweaks-toggle.open { border-color: var(--accent); color: var(--accent); }
.tweaks-panel { position: fixed; bottom: 84px; right: 24px; z-index: 150; width: 280px; background: var(--bg-surface); border: 1.5px solid var(--border-light); border-radius: var(--radius); padding: 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); animation: slideUp 0.2s ease; }
.tweaks-panel h4 { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
.tweaks-group { margin-bottom: 16px; }
.tweaks-label { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
.color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
.color-swatch { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; }
.color-swatch.active { border-color: #fff; transform: scale(1.15); }
.font-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.font-option { padding: 6px 8px; border-radius: 6px; font-size: 0.78rem; background: var(--bg-surface-3); border: 1.5px solid var(--border); color: var(--text-secondary); cursor: pointer; text-align: center; transition: all 0.15s; }
.font-option.active { border-color: var(--accent); color: var(--accent-text); background: var(--accent-dim); }
.toggle-options { display: flex; gap: 6px; }
.toggle-opt { flex: 1; padding: 7px 10px; border-radius: 6px; font-size: 0.78rem; background: var(--bg-surface-3); border: 1.5px solid var(--border); color: var(--text-secondary); cursor: pointer; text-align: center; transition: all 0.15s; }
.toggle-opt.active { border-color: var(--accent); color: var(--accent-text); background: var(--accent-dim); }
.radius-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--bg-surface-3); outline: none; cursor: pointer; }
.radius-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; }

/* ─── Animations ────────────────────────────────────────────── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim-title {
  animation: fadeSlideUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.anim-subtitle {
  animation: fadeSlideUp 0.65s 0.12s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.anim-label {
  animation: fadeSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* ─── Social Buttons (WA / IG) ───────────────────────────────── */
.social-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; border-radius: 12px;
  font-weight: 700; font-size: 0.95rem; text-decoration: none;
  transition: background 0.2s, color 0.2s; font-family: inherit;
}
.social-btn-wa {
  background: #1a3d2b; border: 1px solid #25d366; color: #25d366;
}
.social-btn-wa:hover { background: #25d366; color: #fff; }
.social-btn-ig {
  background: rgba(225,48,108,0.12); border: 1px solid #e1306c; color: #e1306c;
}
.social-btn-ig:hover { background: #e1306c; color: #fff; }

/* ─── Materials CTA ──────────────────────────────────────────── */
.materials-cta { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 40px; }
.materials-cta .section-label { margin-bottom: 8px; }
.materials-pills { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
.material-pill {
  padding: 10px 22px; border: 1.5px solid var(--accent); color: var(--accent-text);
  font-weight: 700; font-size: 1rem; border-radius: 99px;
  background: var(--accent-dim); white-space: nowrap;
}

/* ─── Hero Cover Controls ────────────────────────────────────── */
@keyframes kenburnsOut {
  0%   { transform: scale(1.15); }
  100% { transform: scale(1.0);  }
}
.hero-cover-img {
  position: absolute; inset: 0; z-index: 0;
  width: 100%; height: 100%; object-fit: cover; opacity: 0.40;
  transform-origin: center center;
  animation: kenburnsOut 20s ease-in-out infinite alternate;
  will-change: transform;
}
.hero-cover-panel {
  position: absolute; bottom: 16px; left: 16px; z-index: 10;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px; width: 220px;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.hero-cover-panel label {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 4px;
}
.hero-cover-panel input[type=range] {
  width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
  background: var(--bg-surface-3); border-radius: 2px; cursor: pointer;
}
.hero-cover-panel input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
}
.hero-cover-panel-row { display: flex; gap: 6px; }
.hero-cover-add-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px; border-radius: var(--radius-xs); background: var(--accent-dim);
  border: 1.5px solid rgba(255,255,255,0.15); color: var(--accent-text);
  font-family: var(--font-mono); font-size: 0.7rem; cursor: pointer; width: 100%;
  transition: all 0.15s;
}
.hero-cover-add-btn:hover { background: var(--accent); color: #fff; }

/* ─── CropableImage ──────────────────────────────────────────── */
.cropable-hover-overlay {
  position: absolute; inset: 0; z-index: 8;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 6px; padding: 10px;
  background: linear-gradient(to top, rgba(6,8,13,0.82) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.2s;
}
.cropable-wrap:hover .cropable-hover-overlay { opacity: 1; }
.cropable-action-btn {
  padding: 6px 10px; border-radius: 6px; font-size: 0.68rem;
  font-family: var(--font-mono); cursor: pointer;
  background: rgba(14,19,32,0.9); border: 1px solid var(--border-light);
  color: var(--text-secondary); transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.cropable-action-btn:hover { background: var(--accent-dim); color: var(--accent-text); border-color: var(--accent); }
.cropable-action-remove:hover { background: rgba(239,68,68,0.15) !important; color: #f87171 !important; border-color: rgba(239,68,68,0.5) !important; }
.cropable-wrap { position: relative; overflow: hidden; width: 100%; }
.cropable-wrap .crop-edit-btn {
  position: absolute; top: 8px; right: 8px; z-index: 10;
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(6,8,13,0.75); border: 1px solid var(--border-light);
  color: var(--text-secondary); display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s, background 0.15s; cursor: pointer;
}
.cropable-wrap:hover .crop-edit-btn { opacity: 1; }
.cropable-wrap .crop-edit-btn:hover { background: var(--accent-dim); color: var(--accent-text); }
.crop-panel {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  background: rgba(6,8,13,0.88); backdrop-filter: blur(8px);
  padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
}
.crop-panel label {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 3px;
}
.crop-panel input[type=range] {
  width: 100%; height: 3px; -webkit-appearance: none; appearance: none;
  background: var(--border-light); border-radius: 2px; cursor: pointer;
}
.crop-panel input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
}
.crop-panel-actions { display: flex; gap: 6px; margin-top: 4px; }
.crop-panel-actions button {
  flex: 1; padding: 6px; border-radius: 6px; font-family: var(--font-mono);
  font-size: 0.7rem; background: var(--bg-surface-3); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
}
.crop-panel-actions button:hover { border-color: var(--border-light); color: var(--text-primary); }
.crop-panel-actions .crop-remove-btn:hover { border-color: #ef4444; color: #f87171; }
.cropable-upload-overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  background: transparent; cursor: pointer; z-index: 5; opacity: 0;
  transition: opacity 0.2s;
}
.cropable-wrap:hover .cropable-upload-overlay { opacity: 1; }
.cropable-upload-overlay span {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--accent-text); background: rgba(6,8,13,0.7);
  padding: 4px 10px; border-radius: 99px;
}

/* ─── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

/* ─── Responsive ─────────────────────────────────────────────── */
@media (max-width: 1024px) {
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
  .about-hero { grid-template-columns: 1fr; gap: 32px; }
  .about-photo { max-width: 360px; }
  .hire-layout { grid-template-columns: 1fr; }
  .hire-sidebar { position: static; }
}
@media (max-width: 900px) {
  .hero-left-col { padding: 48px 0; }
}
@media (max-width: 768px) {
  :root { --section-gap: 64px; }
  .nav-links, .nav-cta { display: none; }
  .nav-hamburger { display: flex; }
  .events-grid, .form-row { grid-template-columns: 1fr; }
  .hero h1 { font-size: 2.4rem; }

// IMPORTANTE: PreviewBox e ControlsBox são JSX inline (não sub-componentes)
// para evitar desmontagem/remontagem a cada re-render que causava piscamento.
function PhotoEditorModal({ src, aspectRatio, initialPosX, initialPosY, initialScale, onConfirm, onCancel }) {
  const [posX, setPosX]   = useState(initialPosX ?? 50);
  const [posY, setPosY]   = useState(initialPosY ?? 50);
  const [scale, setScale] = useState(initialScale ?? 1);
  const [showFull, setShowFull] = useState(false);
  const drag = React.useRef({ active: false, lastX: 0, lastY: 0 });

  const startDrag = (x, y) => { drag.current = { active: true, lastX: x, lastY: y }; };
  const moveDrag  = (x, y) => {
    if (!drag.current.active) return;
    const dx = x - drag.current.lastX;
    const dy = y - drag.current.lastY;
    drag.current.lastX = x; drag.current.lastY = y;
    setPosX(p => Math.min(100, Math.max(0, p - dx * 0.3)));
    setPosY(p => Math.min(100, Math.max(0, p - dy * 0.3)));
  };
  const stopDrag = () => { drag.current.active = false; };

  const [wN, hN]  = (aspectRatio || '4/3').split('/').map(Number);
  const sideLayout = (wN / hN) < 1; // retrato → lado a lado; paisagem → empilhado

  const modalContent = (
    <div
      style={{position:'fixed',inset:0,zIndex:9000,background:'rgba(6,8,13,0.97)',
        display:'flex',alignItems:'center',justifyContent:'center',padding:24}}
      onClick={e=>e.stopPropagation()}
    >
      <div
        style={{
          background:'var(--bg-surface)',borderRadius:'var(--radius)',
          border:'1px solid var(--border-light)',
          padding:20, gap:20,
          display:'flex',
          flexDirection: sideLayout ? 'row' : 'column',
          alignItems: sideLayout ? 'flex-start' : 'stretch',
          maxWidth: sideLayout ? 860 : 620,
          width:'100%', maxHeight:'95vh', overflow:'auto',
        }}
        onClick={e=>e.stopPropagation()}
      >

        {/* ── Preview na proporção exata do slot ── */}
        <div
          style={{
            position:'relative', overflow:'hidden', flexShrink:0,
            aspectRatio: aspectRatio || '4/3',
            cursor:'grab', userSelect:'none',
            borderRadius:'var(--radius-sm)',
            border:'2px solid var(--accent)',
            background:'#000',
            ...(sideLayout
              ? { height:'min(68vh, 500px)', width:'auto' }
              : { width:'100%', maxHeight:'50vh' }),
          }}
          onMouseDown={e=>{e.preventDefault();e.stopPropagation();startDrag(e.clientX,e.clientY);}}
          onMouseMove={e=>{e.stopPropagation();moveDrag(e.clientX,e.clientY);}}
          onMouseUp={e=>{e.stopPropagation();stopDrag();}}
          onMouseLeave={e=>{e.stopPropagation();stopDrag();}}
          onTouchStart={e=>{e.stopPropagation();startDrag(e.touches[0].clientX,e.touches[0].clientY);}}
          onTouchMove={e=>{e.stopPropagation();e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}}
          onTouchEnd={e=>{e.stopPropagation();stopDrag();}}
        >
          <img src={src} draggable={false} style={{
            position:'absolute',top:0,left:0,
            width:'100%',height:'100%',
            objectFit: showFull ? 'contain' : 'cover',
            transform:`scale(${scale}) translate(${(50-posX)*0.5}%,${(50-posY)*0.5}%)`,
            transformOrigin:'center center',
            pointerEvents:'none',userSelect:'none',
          }} />
          {/* Grade de terços */}
          <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:1,
            backgroundImage:'linear-gradient(rgba(255,255,255,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.07) 1px,transparent 1px)',
            backgroundSize:'33.33% 33.33%'}} />
          <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',
            fontFamily:'var(--font-mono)',fontSize:'0.56rem',color:'rgba(255,255,255,0.5)',
            background:'rgba(0,0,0,0.65)',padding:'3px 10px',borderRadius:20,
            pointerEvents:'none',zIndex:2,whiteSpace:'nowrap'}}>
            ✥ Arraste para mover
          </div>
        </div>

        {/* ── Controles ── */}
        <div style={{display:'flex',flexDirection:'column',gap:14,justifyContent:'center',
          ...(sideLayout ? {flex:1,minWidth:220} : {})}}>

          <div>
            <div style={{fontWeight:700,fontSize:'0.95rem',color:'var(--text-primary)',marginBottom:2}}>Posicionar foto</div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'0.6rem',color:'var(--text-muted)'}}>
              Arraste o preview · ou use os controles
            </div>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {[
              {icon:'🔍',label:'Zoom',       val:scale,set:setScale,min:1,  max:4,  step:0.05,fmt:v=>`${v.toFixed(2)}x`},
              {icon:'↔', label:'Horizontal', val:posX, set:setPosX, min:0,  max:100,step:1,   fmt:v=>`${v}%`},
              {icon:'↕', label:'Vertical',   val:posY, set:setPosY, min:0,  max:100,step:1,   fmt:v=>`${v}%`},
            ].map(s => (
              <div key={s.label} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:'1rem',minWidth:20}}>{s.icon}</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--text-muted)',minWidth:76}}>{s.label}</span>
                <input type="range" min={s.min} max={s.max} step={s.step} value={s.val}
                  style={{flex:1}}
                  onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}
                  onChange={e=>s.set(Number(e.target.value))} />
                <span style={{fontFamily:'var(--font-mono)',fontSize:'0.68rem',color:'var(--accent-text)',minWidth:40,textAlign:'right'}}>{s.fmt(s.val)}</span>
              </div>
            ))}
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
            <button
              style={{width:'100%',padding:'9px',borderRadius:'var(--radius-sm)',
                background: showFull ? 'rgba(255,255,255,0.12)' : 'var(--bg-surface-3)',
                border:'1px solid var(--border-light)',
                color:'var(--text-secondary)',fontFamily:'var(--font-mono)',fontSize:'0.72rem',cursor:'pointer'}}
              onClick={e=>{e.stopPropagation();setShowFull(v=>!v);}}
            >{showFull ? '🔲 Ver enquadrado' : '🖼 Ver foto completa'}</button>
            <button
              style={{width:'100%',padding:'11px',borderRadius:'var(--radius-sm)',
                background:'rgba(255,255,255,0.08)',border:'1px solid var(--accent)',
                color:'var(--accent-text)',fontFamily:'var(--font-mono)',fontSize:'0.78rem',
                cursor:'pointer',fontWeight:700}}
              onClick={e=>{e.stopPropagation();onConfirm(posX,posY,scale);}}
            >✓ Confirmar posição</button>
            <button
              style={{width:'100%',padding:'9px',borderRadius:'var(--radius-sm)',
                background:'var(--bg-surface-3)',border:'1px solid var(--border)',
                color:'var(--text-secondary)',fontFamily:'var(--font-mono)',fontSize:'0.72rem',cursor:'pointer'}}
              onClick={e=>{e.stopPropagation();onCancel();}}
            >Cancelar</button>
          </div>
        </div>

      </div>
    </div>
  );
  // Portal: renderiza diretamente no body, fora de qualquer hierarquia React
  return ReactDOM.createPortal(modalContent, document.body);
}

// ── Admin Login Modal ─────────────────────────────────────────
function AdminLoginModal({ onClose, onSuccess }) {
  const [email, setEmail] = useState('');
  const [pwd, setPwd]     = useState('');
  const [err, setErr]     = useState('');
  const [loading, setLoading] = useState(false);
  const inputRef = useRef();

  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    setTimeout(() => inputRef.current && inputRef.current.focus(), 80);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  const handleLogin = async () => {
    if (!email || !pwd) { setErr('Preencha e-mail e senha.'); return; }
    setLoading(true); setErr('');
    const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { setErr('E-mail ou senha incorretos.'); setLoading(false); return; }
    onSuccess();
    setLoading(false);
  };

  const handleKey = e => { if (e.key === 'Enter') handleLogin(); };

  return ReactDOM.createPortal(
    <div style={{
      position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.88)',
      backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:24
    }} onClick={onClose}>
      <div style={{

              style={{
                background:'#181818',border:'1.5px solid #2a2a2a',borderRadius:8,
                padding:'13px 16px',color:'#f0f0f0',fontSize:'.95rem',outline:'none',

            onClick={onClose}

        </div>
      </div>
    </div>,
    document.body
  );
}

function CropableImage({ sport, label, aspectRatio, externalInputRef,
    initialSrc, initialPosX, initialPosY, initialScale, onSave }) {
  const { isAdmin } = useAdmin();
  const [src, setSrc]       = useState(initialSrc || null);
  const [posX, setPosX]     = useState(initialPosX ?? 50);
  const [posY, setPosY]     = useState(initialPosY ?? 50);
  const [scale, setScale]   = useState(initialScale ?? 1);
  const [editing, setEditing]       = useState(false);
  const [pendingSrc, setPendingSrc]  = useState(null);
  const [pendingFile, setPendingFile] = useState(null);
  const [uploading, setUploading]    = useState(false);
  const inputRef  = useRef();
  const drag = useRef({ active: false, lastX: 0, lastY: 0 });

  // Sync initial props if they change externally
  useEffect(() => { setSrc(initialSrc || null); }, [initialSrc]);
  useEffect(() => { setPosX(initialPosX ?? 50); }, [initialPosX]);
  useEffect(() => { setPosY(initialPosY ?? 50); }, [initialPosY]);
  useEffect(() => { setScale(initialScale ?? 1); }, [initialScale]);

  useEffect(() => {
    if (externalInputRef) externalInputRef.current = inputRef.current;
  }, [externalInputRef]);

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    setPendingFile(file);
    const reader = new FileReader();
    reader.onload = ev => { setPendingSrc(ev.target.result); };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  const handleConfirm = async (px, py, sc) => {
    if (pendingFile) {
      // New file — upload to Supabase Storage
      setUploading(true);
      try {
        const url = await uploadImage(pendingFile);
        setSrc(url); setPosX(px); setPosY(py); setScale(sc);
        setPendingSrc(null); setPendingFile(null);
        if (onSave) onSave(url, px, py, sc);
      } catch(err) {
        alert('Erro no upload: ' + err.message);
      } finally {
        setUploading(false);
      }
    } else {
      // Re-adjust existing image
      setSrc(pendingSrc); setPosX(px); setPosY(py); setScale(sc);
      setPendingSrc(null);
      if (onSave) onSave(pendingSrc || src, px, py, sc);
    }
    setEditing(false);
  };

  // ── handlers de drag compartilhados entre mouse e touch ──
  const startDrag = (x, y) => {
    drag.current.active = true;
    drag.current.lastX = x;
    drag.current.lastY = y;
  };
  const moveDrag = (x, y) => {
    if (!drag.current.active) return;
    const dx = x - drag.current.lastX;
    const dy = y - drag.current.lastY;
    drag.current.lastX = x;
    drag.current.lastY = y;
    setPosX(prev => Math.min(100, Math.max(0, prev - dx * 0.25)));
    setPosY(prev => Math.min(100, Math.max(0, prev - dy * 0.25)));
  };
  const stopDrag = () => { drag.current.active = false; };

  // Modal fullscreen de posicionamento (logo após carregar arquivo)
  // Renderiza o placeholder + o modal por cima (position:fixed) — evita estrutura vazia no DOM
  if (pendingSrc) {
    return (
      <div style={{width:'100%',aspectRatio:aspectRatio||'4/3',position:'relative'}} onClick={e=>e.stopPropagation()}>
        <PlaceholderImage sport={sport} label={label} aspectRatio={aspectRatio} />
        <PhotoEditorModal
          src={pendingSrc}
          aspectRatio={aspectRatio}
          initialPosX={pendingFile ? 50 : posX}
          initialPosY={pendingFile ? 50 : posY}
          initialScale={pendingFile ? 1  : scale}
          onConfirm={handleConfirm}
          onCancel={() => { setPendingSrc(null); setPendingFile(null); }}
        />
        <input ref={inputRef} type="file" accept="image/*" style={{display:'none'}}
          onClick={e=>e.stopPropagation()} onChange={handleFile} />
      </div>
    );
  }

  // No src → placeholder (admin: mostra overlay de upload)
  if (!src) {
    return (
      <div
        className="cropable-wrap"
        style={{aspectRatio: aspectRatio || '4/3'}}
        onClick={e => e.stopPropagation()}
      >
        <PlaceholderImage sport={sport} label={label} aspectRatio={aspectRatio} />
        {isAdmin && (
          <>
            <div className="cropable-upload-overlay"
              onClick={e => { e.stopPropagation(); inputRef.current && inputRef.current.click(); }}>
              <Icons.Upload />
              <span>Adicionar foto</span>
            </div>
            <input ref={inputRef} type="file" accept="image/*"
              style={{display:'none'}}
              onClick={e => e.stopPropagation()}
              onChange={handleFile} />
          </>
        )}
      </div>
    );
  }

  // Uploading overlay
  if (uploading) {
    return (
      <div style={{width:'100%',aspectRatio:aspectRatio||'4/3',position:'relative',background:'#111',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--text-muted)'}}>⏳ Enviando…</span>
      </div>
    );
  }

  // Has src → imagem com drag + botões de hover + PhotoEditorModal (portal) para ajuste
  // Todos os controles ficam DENTRO do cropable-wrap (position:absolute) para não serem
  // cortados pelo overflow:hidden do masonry-item.
  return (
    <div
      className="cropable-wrap"
      style={{
        position:'relative', overflow:'hidden',
        width:'100%', aspectRatio: aspectRatio || '4/3',
        cursor: isAdmin ? (drag.current.active ? 'grabbing' : 'grab') : 'pointer',
        userSelect:'none',
      }}
      onClick={isAdmin ? (e=>e.stopPropagation()) : undefined}
      onMouseDown={isAdmin ? (e=>{e.preventDefault();startDrag(e.clientX,e.clientY);}) : undefined}
      onMouseMove={isAdmin ? (e=>moveDrag(e.clientX,e.clientY)) : undefined}
      onMouseUp={isAdmin ? stopDrag : undefined}
      onMouseLeave={isAdmin ? stopDrag : undefined}
      onTouchStart={isAdmin ? (e=>{e.stopPropagation();startDrag(e.touches[0].clientX,e.touches[0].clientY);}) : undefined}
      onTouchMove={isAdmin ? (e=>{e.stopPropagation();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}) : undefined}
      onTouchEnd={isAdmin ? (e=>{e.stopPropagation();stopDrag();}) : undefined}
    >
      <img src={src} draggable={false} loading="lazy" style={{
        position:'absolute',top:0,left:0,width:'100%',height:'100%',
        objectFit:'cover',
        transform:`scale(${scale}) translate(${(50-posX)*0.5}%,${(50-posY)*0.5}%)`,
        transformOrigin:'center center',
        userSelect:'none',pointerEvents:'none',
      }} />

      {/* Overlay com botões — somente admin */}
      {isAdmin && (
        <>
          <div className="cropable-hover-overlay" onClick={e=>e.stopPropagation()}>
            <button className="cropable-action-btn" onClick={e=>{e.stopPropagation();setPendingSrc(src);}} title="Ajustar">✏️ Ajustar</button>
            <button className="cropable-action-btn" onClick={e=>{e.stopPropagation();inputRef.current&&inputRef.current.click();}} title="Trocar">📁 Trocar</button>
            <button className="cropable-action-btn cropable-action-remove" onClick={e=>{e.stopPropagation();setSrc(null);setScale(1);setPosX(50);setPosY(50);if(onSave)onSave(null,50,50,1);}} title="Remover">🗑 Remover</button>
          </div>
          {pendingSrc && (
            <PhotoEditorModal src={pendingSrc} aspectRatio={aspectRatio}
              initialPosX={pendingFile ? 50 : posX}
              initialPosY={pendingFile ? 50 : posY}
              initialScale={pendingFile ? 1  : scale}
              onConfirm={handleConfirm}
              onCancel={()=>{setPendingSrc(null);setPendingFile(null);}} />
          )}
          <input ref={inputRef} type="file" accept="image/*"
            style={{display:'none'}} onClick={e=>e.stopPropagation()} onChange={handleFile} />
        </>
      )}
    </div>
  );
}

function EventCard({ event, onNotify, onDelete, onUpdate, onOpenDetail, onOpenEdit }) {
  const { isAdmin } = useAdmin();
  const statusMap = {
    available: { cls:'badge-available', label:'Fotos disponíveis' },
    editing:   { cls:'badge-editing',   label:'Em edição' },
    soon:      { cls:'badge-soon',      label:'Em breve' },
  };
  const st = statusMap[event.status] || statusMap.soon;
  const dateStr = event.date ? new Date(event.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : '—';

  return (
    <div className="event-card" style={{cursor:'pointer'}} onClick={() => onOpenDetail && onOpenDetail(event)}>
      {/* Capa */}
      <div className="event-card-cover">
        <CropableImage
          sport={event.sport} label={event.title} aspectRatio="16/9"
          initialSrc={event.cover_url}
          initialPosX={event.cover_pos_x} initialPosY={event.cover_pos_y} initialScale={event.cover_scale}
          onSave={async (url, px, py, sc) => {
            const { error } = await sb.from('events').update({ cover_url: url, cover_pos_x: px, cover_pos_y: py, cover_scale: sc }).eq('id', event.id);
            if (error) { console.error('EventCard onSave error:', error); alert('Erro ao salvar capa: ' + error.message); }
            else if (onUpdate) onUpdate({ ...event, cover_url: url, cover_pos_x: px, cover_pos_y: py, cover_scale: sc });
          }}
        />
        <div className="card-tags"><span className="tag">{event.sport}</span></div>
        <div className="card-status"><span className={`badge ${st.cls}`}><Dot />{st.label}</span></div>
        {isAdmin && (
          <div style={{position:'absolute',top:8,right:8,display:'flex',gap:6,zIndex:10}} onClick={e=>e.stopPropagation()}>
            <button
              title="Editar evento"
              onClick={e => { e.stopPropagation(); onOpenEdit && onOpenEdit(event); }}
              style={{width:28,height:28,borderRadius:'50%',background:'rgba(30,30,30,0.9)',color:'#fff',
                display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #555',cursor:'pointer'}}
            >✏️</button>
            {onDelete && <button
              title="Excluir evento"
              onClick={e => { e.stopPropagation(); onDelete(event.id); }}
              style={{width:28,height:28,borderRadius:'50%',background:'rgba(239,68,68,0.85)',color:'#fff',
                display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer'}}
              onMouseEnter={e=>e.currentTarget.style.background='#ef4444'}
              onMouseLeave={e=>e.currentTarget.style.background='rgba(239,68,68,0.85)'}
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>}
          </div>
        )}
      </div>

      {/* Corpo — informações do evento */}
      <div className="event-card-body">
        <div className="event-card-title">{event.title}</div>
        <div className="event-card-info">
          <div className="event-card-info-row"><Icons.Calendar />{dateStr}</div>
          <div className="event-card-info-row"><Icons.Pin />{event.location} · {event.city}</div>
          <div className="event-card-info-row">
            <span className="tag" style={{fontSize:'0.65rem'}}>{event.sport}</span>
            {event.photos > 0 && <><span style={{marginLeft:6}}><Icons.Image /></span><span className="count">{event.photos.toLocaleString('pt-BR')}</span> fotos</>}
          </div>
        </div>
      </div>

      {/* ── Botão de ação — sempre na base do card ── */}
      {event.status === 'available' && event.store_url ? (
        <button className="event-card-view-link" onClick={e=>{ e.stopPropagation(); onOpenDetail && onOpenDetail(event); }}>
          VISUALIZE SUAS FOTOS AQUI <Icons.ExternalLink />
        </button>
      ) : (
        <button className="event-card-notify-btn" onClick={e => { e.stopPropagation(); onNotify(event); }}>
          <Icons.Bell /> Avise-me quando disponível
        </button>
      )}

    </div>
  );
}

    available: { cls:'badge-available', label:'Fotos disponíveis' },

                background:'#fff',color:'#080808',fontWeight:900,fontSize:'0.9rem',
                letterSpacing:'.08em',textTransform:'uppercase',textDecoration:'none',
                boxShadow:'0 4px 20px rgba(255,255,255,0.15)'}}>
              🛒 Comprar minhas fotos <Icons.ExternalLink />
            </a>
          ) : (
            <button onClick={() => { onClose(); onNotify(event); }}
              style={{width:'100%',padding:'14px',borderRadius:'var(--radius-sm)',
                background:'var(--bg-surface-3)',border:'1px solid var(--border-light)',
                color:'var(--text-primary)',cursor:'pointer',display:'flex',
                alignItems:'center',justifyContent:'center',gap:8,fontSize:'0.88rem'}}>
              <Icons.Bell /> Avise-me quando disponível
            </button>
          )}
        </div>
      </div>
    </div>,
    document.body
  );
}
