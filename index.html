// EDIT EVENT MODAL
// ════════════════════════════════════════════════════════════════
function EditEventModal({ event, onClose, onSave }) {
  const [form, setForm] = useState({
    title:       event.title       || '',
    date:        event.date        || '',
    location:    event.location    || '',
    city:        event.city        || '',
    sport:       event.sport       || '',
    description: event.description || '',
    photos:      event.photos      || 0,
    status:      event.status      || 'available',
    store:       event.store       || '',
    storeUrl:    event.store_url   || '',
  });
  const [saving, setSaving]         = useState(false);
  const [errors, setErrors]         = useState({});
  const [eventPhotos, setEventPhotos] = useState([]);
  const [uploading, setUploading]   = useState(null); // índice do slot sendo enviado
  const [cropSlot, setCropSlot]     = useState(null); // { index, src, file }
  const [dispUrl, setDispUrl]       = useState(event.store_url || '');
  const [fetching, setFetching]     = useState(false);
  const [fetchMsg, setFetchMsg]     = useState(null);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const fetchDisposicaoEdit = async () => {
    const url = dispUrl.trim();
    if (!url || !url.includes('disposicao.com.br')) {
      setFetchMsg({ ok:false, text:'Cole um link válido da Disposição (disposicao.com.br/…)' });
      return;
    }
    setFetching(true);
    setFetchMsg(null);
    try {
      // microlink.io busca server-side sem CORS, suporta seletores CSS customizados
      const api = `https://api.microlink.io/?url=${encodeURIComponent(url)}`
        + `&data.fotos.selector=.badge-meta&data.fotos.type=text`
        + `&data.loc.selector=span%3Ahas(.fa-map-marker-alt)&data.loc.type=text`;
      const res  = await fetch(api, { signal: AbortSignal.timeout(12000) });
      if (!res.ok) throw new Error('microlink falhou: ' + res.status);
      const json = await res.json();
      if (json.status !== 'success') throw new Error('microlink status: ' + json.status);
      const d = json.data;

      const title = (d.title || '').trim();

      let date = '';
      const cdnUrl    = d.image?.url || d.logo?.url || '';
      const dateMatch = cdnUrl.match(/galerias\/(\d{4}-\d{2}-\d{2})/);
      if (dateMatch) date = dateMatch[1];

      let photos = 0;
      const fotosMatch = (d.fotos || '').match(/(\d+)/);
      if (fotosMatch) photos = parseInt(fotosMatch[1]);

      let city = '';
      const locRaw = (d.loc || '').replace(/<[^>]+>/g, '').trim();
      if (locRaw) city = locRaw.replace(/-([A-Z]{2})$/, ', $1');

      const storeUrl = url.split('?')[0];
      set('title',    title    || form.title);
      set('date',     date     || form.date);
      set('city',     city     || form.city);
      set('photos',   photos   || form.photos);
      set('store',    'Disposição');
      set('storeUrl', storeUrl || form.storeUrl);

      const found = [title&&'título', date&&'data', city&&'cidade', photos&&`${photos} fotos`].filter(Boolean);
      setFetchMsg({ ok:true, text:`✓ Importado: ${found.join(', ')}` });
    } catch(err) {
      setFetchMsg({ ok:false, text:'Erro ao buscar. Verifique o link e tente novamente.' });
      console.error('fetchDisposicaoEdit:', err);
    } finally {
      setFetching(false);
    }
  };

  useEffect(() => {
    const onKey = e => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    // Carrega fotos do evento — normaliza position se necessário
    sb.from('event_photos').select('*').eq('event_id', event.id).order('position')
      .then(({ data, error }) => {
        if (error) { console.error('event_photos load:', error); return; }
        if (data) {
          // garante position 0-5 mesmo para registros antigos sem position
          const normalized = data.map((p, i) => ({ ...p, position: p.position ?? i }));
          setEventPhotos(normalized);
        }
      });
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow=''; };
  }, []);


  const removePhoto = async (id) => {
    if (!window.confirm('Remover esta foto?')) return;
    const { error } = await sb.from('event_photos').delete().eq('id', id);
    if (!error) setEventPhotos(prev => prev.filter(p => p.id !== id));
  };

  const submit = async e => {
    e.preventDefault();
    const errs = {};
    if (!form.title.trim()) errs.title = 'Título obrigatório';
    if (!form.date)         errs.date  = 'Data obrigatória';
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setSaving(true);
    const { data, error } = await sb.from('events').update({
      title:       form.title,
      date:        form.date,
      location:    form.location    || null,
      city:        form.city        || null,
      sport:       form.sport       || null,
      description: form.description || null,
      photos:      Number(form.photos) || 0,
      status:      form.status,
      store:       form.store       || null,
      store_url:   form.storeUrl    || null,
    }).eq('id', event.id).select().single();
    setSaving(false);
    if (error) { alert('Erro ao salvar: ' + error.message); return; }
    onSave(data);
  };

  const inputStyle = {
    background:'var(--bg-surface)',border:'1.5px solid var(--border)',borderRadius:'var(--radius-sm)',
    padding:'10px 14px',color:'var(--text-primary)',fontSize:'0.9rem',outline:'none',width:'100%',
    fontFamily:'inherit',boxSizing:'border-box',
  };
  const labelStyle = { display:'block',fontFamily:'var(--font-mono)',fontSize:'0.65rem',
    textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-muted)',marginBottom:5 };

  return ReactDOM.createPortal(
    <div className="modal-overlay" onClick={e=>{e.stopPropagation();if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header" style={{padding:'20px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h3 style={{fontSize:'1.1rem'}}>✏️ Editar Evento</h3>
          <button className="modal-close" style={{position:'static'}} onClick={onClose}><Icons.X /></button>
        </div>
        <form onSubmit={submit} noValidate>
          <div className="modal-body" style={{overflowY:'auto',maxHeight:'72vh',display:'flex',flexDirection:'column',gap:14}}>

            {/* Capa */}
            <div>
              <div style={labelStyle}>Foto de capa</div>
              <div style={{borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
                <CropableImage
                  sport={form.sport||'Corrida'} label="Foto de capa" aspectRatio="16/9"
                  initialSrc={event.cover_url}
                  initialPosX={event.cover_pos_x} initialPosY={event.cover_pos_y} initialScale={event.cover_scale}
                  onSave={async (url, px, py, sc) => {
                    const { error } = await sb.from('events').update({ cover_url: url, cover_pos_x: px, cover_pos_y: py, cover_scale: sc }).eq('id', event.id);
                    if (error) alert('Erro ao salvar capa: ' + error.message);
                    else onSave({ ...event, cover_url: url, cover_pos_x: px, cover_pos_y: py, cover_scale: sc });
                  }}
                />
              </div>
            </div>

            <div>
              <label style={labelStyle}>Título *</label>
              <input style={{...inputStyle, borderColor: errors.title?'#f87171':'var(--border)'}}
                value={form.title} onChange={e=>set('title',e.target.value)} />
              {errors.title && <span style={{color:'#f87171',fontSize:'0.75rem'}}>{errors.title}</span>}
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <label style={labelStyle}>Data *</label>
                <input type="date" style={{...inputStyle, borderColor: errors.date?'#f87171':'var(--border)'}}
                  value={form.date} onChange={e=>set('date',e.target.value)} />
                {errors.date && <span style={{color:'#f87171',fontSize:'0.75rem'}}>{errors.date}</span>}
              </div>
              <div>
                <label style={labelStyle}>Modalidade</label>
                <input style={inputStyle} placeholder="Ex: Corrida, Futebol…"
                  value={form.sport} onChange={e=>set('sport',e.target.value)} />
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <label style={labelStyle}>Local</label>
                <input style={inputStyle} placeholder="Ex: Parque Barigui"
                  value={form.location} onChange={e=>set('location',e.target.value)} />
              </div>
              <div>
                <label style={labelStyle}>Cidade</label>
                <input style={inputStyle} placeholder="Ex: Curitiba, PR"
                  value={form.city} onChange={e=>set('city',e.target.value)} />
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <label style={labelStyle}>Qtd. de fotos</label>
                <input type="number" min="0" style={inputStyle}
                  value={form.photos} onChange={e=>set('photos',e.target.value)} />
              </div>
              <div>
                <label style={labelStyle}>Status</label>
                <select style={{...inputStyle,cursor:'pointer'}}
                  value={form.status} onChange={e=>set('status',e.target.value)}>
                  <option value="available">Disponível</option>
                  <option value="editing">Em edição</option>
                  <option value="soon">Em breve</option>
                </select>
              </div>
            </div>

            <div>
              <label style={labelStyle}>Link da loja (Disposição etc.)</label>
              <input type="url" style={inputStyle} placeholder="https://…"
                value={form.storeUrl} onChange={e=>set('storeUrl',e.target.value)} />
            </div>

            {/* ── Importar da Disposição ── */}
            <div style={{
              background:'var(--bg-surface-3)',border:'1px solid var(--border-light)',
              borderRadius:'var(--radius-sm)',padding:'14px 16px',
            }}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',textTransform:'uppercase',
                letterSpacing:'0.08em',color:'var(--accent-text)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                <span>⚡</span> Importar dados da Disposição
              </div>
              <div style={{display:'flex',gap:8}}>
                <input
                  style={{...inputStyle,flex:1,fontSize:'0.82rem',padding:'9px 12px'}}
                  placeholder="https://dmfoto.disposicao.com.br/…"
                  value={dispUrl}
                  onChange={e=>setDispUrl(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),fetchDisposicaoEdit())}
                />
                <button type="button"
                  style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:'var(--radius-sm)',
                    padding:'9px 16px',fontWeight:700,cursor:fetching?'wait':'pointer',whiteSpace:'nowrap',
                    opacity:fetching?0.7:1,fontSize:'0.82rem'}}
                  onClick={fetchDisposicaoEdit}
                  disabled={fetching}>
                  {fetching ? '…' : 'Importar'}
                </button>
              </div>
              {fetchMsg && (
                <div style={{marginTop:8,fontSize:'0.78rem',
                  color: fetchMsg.ok ? 'var(--accent-text)' : '#f87171'}}>
                  {fetchMsg.text}
                </div>
              )}
            </div>

            <div>
              <label style={labelStyle}>Descrição</label>
              <textarea rows={3} style={{...inputStyle,resize:'vertical'}}
                value={form.description} onChange={e=>set('description',e.target.value)} />
            </div>

            {/* ── Fotos do evento — grade de slots fixos ── */}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
              <label style={{...labelStyle,marginBottom:12}}>Fotos do evento (até 6)</label>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                {Array.from({length:6}).map((_,i) => {
                  const photo = eventPhotos.find(p => p.position === i);
                  const isUploading = uploading === i;
                  const inputId = `evt-photo-${i}`;
                  return (
                    <div key={i} style={{position:'relative',aspectRatio:'3/4',borderRadius:'var(--radius-sm)',overflow:'hidden',
                      background:'var(--bg-surface-2)',border:'1.5px dashed var(--border-light)',cursor:'pointer'}}
                      onClick={()=>!isUploading&&document.getElementById(inputId)&&document.getElementById(inputId).click()}>
                      <input id={inputId} type="file" accept="image/*" style={{display:'none'}}
                        onChange={e=>{
                          const file = e.target.files[0]; if(!file) return;
                          const reader = new FileReader();
                          reader.onload = ev => setCropSlot({ index: i, src: ev.target.result, file });
                          reader.readAsDataURL(file);
                          e.target.value = '';
                        }}
                      />
                      {isUploading ? (
                        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
                          background:'var(--bg-surface-3)',fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--text-muted)'}}>
                          ⏳
                        </div>
                      ) : photo ? (
                        <>
                          <img src={photo.image_url} loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover',
                            transform:`scale(${photo.scale||1}) translate(${(50-(photo.pos_x??50))*0.5}%,${(50-(photo.pos_y??50))*0.5}%)`,
                            transformOrigin:'center center'}} />
                          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0)',transition:'background .2s',display:'flex',alignItems:'center',justifyContent:'center',gap:6,opacity:0}}
                            className="photo-slot-hover">
                          </div>
                          <button type="button"
                            onClick={e=>{e.stopPropagation();removePhoto(photo.id);}}
                            style={{position:'absolute',top:4,right:4,width:22,height:22,borderRadius:'50%',
                              background:'rgba(239,68,68,0.9)',border:'none',color:'#fff',cursor:'pointer',
                              display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,zIndex:2}}>
                            ✕
                          </button>
                          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'4px 6px',
                            background:'rgba(0,0,0,0.5)',fontFamily:'var(--font-mono)',fontSize:'0.55rem',
                            color:'rgba(255,255,255,0.6)',textAlign:'center'}}>
                            clique para trocar
                          </div>
                        </>
                      ) : (
                        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
                          alignItems:'center',justifyContent:'center',gap:8,color:'var(--text-muted)'}}>
                          <Icons.Camera />
                          <span style={{fontFamily:'var(--font-mono)',fontSize:'0.6rem',letterSpacing:'0.08em',textTransform:'uppercase'}}>
                            Foto {i+1}
                          </span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

          </div>
          <div className="modal-footer" style={{display:'flex',gap:10,padding:'16px 24px',borderTop:'1px solid var(--border)'}}>
            <button type="button" className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn btn-primary" style={{flex:2}} disabled={saving}>
              {saving ? 'Salvando…' : '✓ Salvar alterações'}
            </button>
          </div>
        </form>
      </div>

      {/* Editor de posicionamento para fotos de evento */}
      {cropSlot && (
        <PhotoEditorModal
          src={cropSlot.src}
          aspectRatio="3/4"
          onConfirm={async (posX, posY, scale) => {
            const { index, file } = cropSlot;
            setCropSlot(null);
            setUploading(index);
            try {
              const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
              const fname = `evt-${event.id}-${index}-${Date.now()}.${ext}`;
              const { error: upErr } = await sb.storage.from('photos').upload(fname, file, { upsert: true });
              if (upErr) { alert('Erro no upload: ' + upErr.message); return; }
              const url = sb.storage.from('photos').getPublicUrl(fname).data.publicUrl;
              const photoAtPos = eventPhotos.find(p => p.position === index);
              if (photoAtPos) {
                const {data,error} = await sb.from('event_photos').update({image_url:url,pos_x:posX,pos_y:posY,scale}).eq('id',photoAtPos.id).select().single();
                if(error){ alert('Erro ao salvar: '+error.message); return; }
                if(data) setEventPhotos(prev=>prev.map(p=>p.id===data.id?data:p));
              } else {
                const {data,error} = await sb.from('event_photos').insert({event_id:event.id,image_url:url,position:index,pos_x:posX,pos_y:posY,scale}).select().single();
                if(error){ alert('Erro ao salvar: '+error.message); return; }
                if(data) setEventPhotos(prev=>[...prev,data]);
              }
            } catch(err){ alert('Erro: '+(err.message||JSON.stringify(err))); }
            finally{ setUploading(null); }
          }}
          onCancel={() => setCropSlot(null)}
        />
      )}
    </div>,
    document.body
  );
}

function NotifyModal({ event, onClose }) {
  const [email, setEmail] = useState('');
  const [done, setDone] = useState(false);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, []);
  const handleSubmit = e => {
    e.preventDefault(); if (!email) return;
    setLoading(true); setTimeout(() => { setLoading(false); setDone(true); }, 800);
  };
  const statusCls = event.status === 'soon' ? 'badge-soon' : 'badge-editing';
  const statusLabel = event.status === 'soon' ? 'Em breve' : 'Em edição';
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal-box" style={{maxWidth:420}}>
        <div className="modal-header">
          <div className="modal-cover" style={{aspectRatio:'16/7'}}>
            <PlaceholderImage sport={event.sport} label={event.title} aspectRatio="16/7" />
            <button className="modal-close" onClick={onClose}><Icons.X /></button>
          </div>
          <div className="modal-header-info">
            <div style={{flex:1}}>
              <div style={{display:'flex',gap:8,marginBottom:8}}>
                <span className="tag">{event.sport}</span>
                <span className={`badge ${statusCls}`}>{statusLabel}</span>
              </div>
              <h3 style={{fontSize:'1rem'}}>{event.title}</h3>
            </div>
          </div>
        </div>
        <div className="modal-body">
          {done ? (
            <div className="success-state">
              <div className="success-icon"><Icons.Check /></div>
              <h3>Tudo certo!</h3>
              <p>Você receberá um aviso assim que as fotos de <strong>{event.title}</strong> estiverem disponíveis.</p>
            </div>
          ) : (
            <>
              <p className="modal-text">{event.status==='soon'?'Este evento ainda não aconteceu. Cadastre seu e-mail para ser notificado assim que as fotos estiverem disponíveis.':'As fotos deste evento estão em processo de edição. Você será avisado por e-mail quando estiverem prontas.'}</p>
              <form className="notify-form" onSubmit={handleSubmit}>
                <input type="email" placeholder="seu@email.com" required value={email} onChange={e => setEmail(e.target.value)} />
                <button type="submit" className="btn btn-primary" disabled={loading}>
                  {loading ? <span className="btn-spinner"><span className="spinner" /> Cadastrando…</span> : <><Icons.Bell /> Quero ser avisado</>}
                </button>
              </form>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Lightbox ──
function Lightbox({ items, index, onClose, onNavigate }) {
  useEffect(() => {
    const onKey = e => {
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft') onNavigate(-1);
      if(e.key==='ArrowRight') onNavigate(1);
    };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [index]);
  const item = items[index];
  return (
    <div className="lightbox" onClick={e => e.target===e.currentTarget && onClose()}>
      <button className="lightbox-close" onClick={onClose}><Icons.X /></button>
      <button className="lightbox-nav prev" onClick={() => onNavigate(-1)}><Icons.ChevronLeft /></button>
      <div className="lightbox-img"><PlaceholderImage sport={item.sport} label={item.title} aspectRatio={SIZE_RATIO[item.size]||'4/3'} /></div>
      <button className="lightbox-nav next" onClick={() => onNavigate(1)}><Icons.ChevronRight /></button>
      <div className="lightbox-info">
        <span className="lb-title">{item.title}</span>
        <span className="tag">{item.sport}</span>
        <span className="lightbox-counter">{index+1} / {items.length}</span>
      </div>
    </div>
  );
}

// ── Tweaks Panel ──
function TweaksPanel() {
  const { isAdmin } = useAdmin();
  const [open, setOpen] = useState(false);
  const [accent, setAccent] = useState('#3b82f6');
  const [font, setFont] = useState('Plus Jakarta Sans');
  const [heroLayout, setHeroLayout] = useState('left');
  const [heroX, setHeroX] = useState(0);
  const [radius, setRadius] = useState(18);
  const colors = [{hex:'#3b82f6',label:'Azul'},{hex:'#8b5cf6',label:'Roxo'},{hex:'#10b981',label:'Verde'},{hex:'#f59e0b',label:'Âmbar'},{hex:'#ef4444',label:'Vermelho'},{hex:'#ec4899',label:'Rosa'}];
  const fonts = ['Plus Jakarta Sans','Sora','Archivo'];
  const apply = (a,f,h,hx,r) => {
    document.documentElement.style.setProperty('--accent',a);
    document.documentElement.style.setProperty('--accent-glow',a+'55');
    document.documentElement.style.setProperty('--accent-dim',a+'1a');
    document.documentElement.style.setProperty('--font-sans',`'${f}', sans-serif`);
    document.documentElement.style.setProperty('--radius',`${r}px`);
    document.documentElement.style.setProperty('--radius-sm',`${Math.round(r*0.56)}px`);
    window.__heroLayout = h; window.__heroX = hx; window.dispatchEvent(new Event('tweaks-change'));
  };
  if (!isAdmin) return null;
  return (
    <>
      <button className={`tweaks-toggle${open?' open':''}`} onClick={() => setOpen(v=>!v)} title="Personalizar"><Icons.Settings /></button>
      {open && (
        <div className="tweaks-panel">
          <h4>⚡ Personalizar</h4>
          <div className="tweaks-group">
            <div className="tweaks-label">Cor de destaque</div>
            <div className="color-swatches">
              {colors.map(c => <button key={c.hex} className={`color-swatch${accent===c.hex?' active':''}`} style={{background:c.hex}} title={c.label} onClick={() => { setAccent(c.hex); apply(c.hex,font,heroLayout,heroX,radius); }} />)}
            </div>
          </div>
          <div className="tweaks-group">
            <div className="tweaks-label">Tipografia</div>
            <div className="font-options">
              {fonts.map(f => <button key={f} className={`font-option${font===f?' active':''}`} style={{fontFamily:`'${f}',sans-serif`}} onClick={() => { setFont(f); apply(accent,f,heroLayout,heroX,radius); }}>{f.split(' ')[0]}</button>)}
            </div>
          </div>
          <div className="tweaks-group">
            <div className="tweaks-label">Layout do herói</div>
            <div className="toggle-options">
              {[['left','Esquerda'],['center','Centro']].map(([v,l]) => <button key={v} className={`toggle-opt${heroLayout===v?' active':''}`} onClick={() => { setHeroLayout(v); apply(accent,font,v,heroX,radius); }}>{l}</button>)}
            </div>
          </div>
          {heroLayout === 'left' && (
            <div className="tweaks-group">
              <div className="tweaks-label">Posição horizontal — {heroX}%</div>
              <input type="range" className="radius-slider" min="0" max="100" step="1" value={heroX}
                onChange={e => { const hx=Number(e.target.value); setHeroX(hx); apply(accent,font,heroLayout,hx,radius); }} />
            </div>
          )}
          <div className="tweaks-group">
            <div className="tweaks-label">Arredondamento — {radius}px</div>
            <input type="range" className="radius-slider" min="4" max="28" value={radius} onChange={e => { const r=Number(e.target.value); setRadius(r); apply(accent,font,heroLayout,heroX,r); }} />
          </div>
        </div>
      )}
    </>
  );
}

// ── Home Page ──
function HomePage({ navigate, onNotify }) {
  const { isAdmin } = useAdmin();
  const [heroLayout, setHeroLayout] = useState(window.__heroLayout||'left');
  const [heroX, setHeroX] = useState(window.__heroX||0);
  const [photoRows, setPhotoRows] = useState(2);
  const [homePhotos, setHomePhotos] = useState([]);
  // Cover image states (Prompt 10)
  const [coverImage, setCoverImage] = useState(null);
  const [coverPending, setCoverPending] = useState(null); // aguardando posicionamento
  const [coverX, setCoverX] = useState(50);
  const [coverY, setCoverY] = useState(50);
  const coverInputRef = React.useRef();

  useEffect(() => {
    const upd = () => { setHeroLayout(window.__heroLayout||'left'); setHeroX(window.__heroX||0); };
    window.addEventListener('tweaks-change', upd);
    return () => window.removeEventListener('tweaks-change', upd);
  }, []);

  // Carrega fotos da home do Supabase (position >= 0 = galeria; position = -1 = capa hero)
  useEffect(() => {
    sb.from('homepage_photos').select('*').order('position', { ascending: true })
      .then(({ data }) => {
        if (!data) return;
        const hero = data.find(p => p.position === -1);
        if (hero) { setCoverImage(hero.image_url); setCoverX(hero.image_pos_x ?? 50); setCoverY(hero.image_pos_y ?? 50); }
        const gallery = data.filter(p => p.position >= 0);
        if (gallery.length) { setHomePhotos(gallery); setPhotoRows(Math.ceil(gallery.length / 4)); }
      });
  }, []);

  const handleCoverFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setCoverPending(ev.target.result);
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  // Upsert foto por posição
  const saveHomePhoto = async (position, url, px, py, sc) => {
    const existing = homePhotos.find(p => p.position === position);
    if (existing) {
      const { data, error } = await sb.from('homepage_photos')
        .update({ image_url: url, image_pos_x: px, image_pos_y: py, image_scale: sc })
        .eq('id', existing.id).select().single();
      if (error) { console.error('homePhoto update error:', error); alert('Erro: ' + error.message); return; }
      if (data) setHomePhotos(prev => prev.map(p => p.id === data.id ? data : p));
    } else {
      const { data, error } = await sb.from('homepage_photos')
        .insert({ position, image_url: url, image_pos_x: px, image_pos_y: py, image_scale: sc })
        .select().single();
      if (error) { console.error('homePhoto insert error:', error); alert('Erro: ' + error.message); return; }
      if (data) setHomePhotos(prev => [...prev, data]);
    }
  };

  const totalPhotos = photoRows * 4;

  return (
    <main>
      {/* ── Hero ── */}
      <section className="hero">
        {/* Fundo padrão (gradiente + grid + pitch lines) */}
        <div className="hero-bg" />
        <div className="hero-grid-overlay" />
        <div className="hero-pitch-lines" />
        {/* Foto de capa com zoom-out infinito */}
        {coverImage && (
          <div style={{position:'absolute',inset:0,zIndex:0,overflow:'hidden'}}>
            <img
              src={coverImage}
              className="hero-cover-img"
              style={{objectPosition:`${coverX}% ${coverY}%`}}
            />
            <div style={{
              position:'absolute',inset:0,zIndex:1,
              background:'linear-gradient(to bottom, rgba(6,8,13,0.3) 0%, transparent 30%, var(--bg-primary) 100%)',
              pointerEvents:'none',
            }} />
          </div>
        )}
        <div className="hero-two-col">
          {/* Coluna esquerda — texto */}
          <div className="hero-left-col">
            <div className="hero-scoreboard anim-label">
              <span className="sb-seg">Maringá/PR</span>
              <span className="sb-seg accent">DM Foto</span>
              <span className="sb-seg">Fotografia esportiva</span>
            </div>
            <h1 className="anim-title">
              Não é só<br />
              uma <span className="outline">foto.</span>
            </h1>
            <p className="hero-sub anim-subtitle">
              A fotografia é um frame congelado da história; o momento exato em que emoção, esforço e legado se encontram.
            </p>
            <div className="hero-actions">
              <button className="btn btn-primary btn-lg" onClick={() => navigate('events')}><Icons.Search /> Encontrar minhas fotos</button>
              <button className="btn btn-outline btn-lg" onClick={() => navigate('portfolio')}>Ver portfólio <Icons.ArrowRight /></button>
            </div>
          </div>

        </div>
        {/* Painel de controle da foto de capa — somente admin */}
        {isAdmin && (
          <>
            <div className="hero-cover-panel">
              <button className="hero-cover-add-btn" onClick={() => coverInputRef.current.click()}>
                📷 {coverImage ? 'Trocar foto de capa' : 'Adicionar foto de capa'}
              </button>
              {coverImage && <>
                <button className="hero-cover-add-btn"
                  style={{borderColor:'rgba(255,255,255,0.25)',color:'var(--accent-text)'}}
                  onClick={()=>setCoverPending(coverImage)}>
                  ✏️ Reposicionar
                </button>
                <button className="hero-cover-add-btn"
                  style={{background:'rgba(239,68,68,0.12)',borderColor:'#ef4444',color:'#f87171'}}
                  onClick={async ()=>{ setCoverImage(null); await sb.from('homepage_photos').delete().eq('position',-1); }}>
                  ✕ Remover foto
                </button>
              </>}
            </div>
            <input ref={coverInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleCoverFile} />
          </>
        )}

        {/* Modal de posicionamento da capa — portal */}
        {coverPending && (
          <PhotoEditorModal
            src={coverPending}
            aspectRatio="16/9"
            onConfirm={async (px, py) => {
              try {
                let url = coverPending;
                // Se for dataURL (novo upload), envia pro Storage primeiro
                if (url.startsWith('data:')) {
                  const res  = await fetch(url);
                  const blob = await res.blob();
                  const file = new File([blob], 'hero-cover.jpg', { type: blob.type });
                  url = await uploadImage(file);
                }
                setCoverImage(url); setCoverX(px); setCoverY(py); setCoverPending(null);
                // Salva/atualiza no Supabase (position = -1 reservado para capa hero)
                const existing = await sb.from('homepage_photos').select('id').eq('position', -1).maybeSingle();
                if (existing.data) {
                  await sb.from('homepage_photos').update({ image_url: url, image_pos_x: px, image_pos_y: py, image_scale: 1 }).eq('id', existing.data.id);
                } else {
                  await sb.from('homepage_photos').insert({ position: -1, image_url: url, image_pos_x: px, image_pos_y: py, image_scale: 1 });
                }
              } catch(err) {
                alert('Erro ao salvar capa: ' + err.message);
                setCoverPending(null);
              }
            }}
            onCancel={() => setCoverPending(null)}
          />
        )}
      </section>

      {/* ── 4. SEM seção "Como funciona" ── */}

      {/* ── 5. Galeria de fotos (substitui events-grid) ── */}
      <section className="section">
        <div className="container">
          <div className="section-header">
            <h2 className="anim-title">Trabalhos Recentes</h2>
          </div>

          {/* Grade 4 colunas, aspect-ratio 4:5 */}
          <div className="photo-gallery-grid">
            {Array.from({length:totalPhotos}).map((_,i) => {
              const ph = homePhotos.find(p => p.position === i);
              return (
                <div key={i} style={{borderRadius:'var(--radius-sm)',overflow:'hidden',border:'1.5px dashed var(--border-light)'}}>
                  <CropableImage
                    sport="Corrida" label={`Foto ${i+1}`} aspectRatio="4/5"
                    initialSrc={ph?.image_url}
                    initialPosX={ph?.image_pos_x} initialPosY={ph?.image_pos_y} initialScale={ph?.image_scale}
                    onSave={(url, px, py, sc) => saveHomePhoto(i, url, px, py, sc)}
                  />
                </div>
              );
            })}
          </div>

          {/* Botão adicionar linha — somente admin */}
          {isAdmin && (
            <button className="btn btn-outline" style={{marginTop:4}} onClick={() => setPhotoRows(r => r+1)}>
              <Icons.Plus /> Adicionar linha
            </button>
          )}

          {/* Stats — abaixo das fotos */}
          <div className="hero-stats" style={{marginTop:48,borderTop:'1px solid var(--border)',paddingTop:32}}>
            {[
              { val:'200+',         label:'Eventos cobertos' },
              { val:'180k+',        label:'Fotos entregues' },
              { val:'Envio Rápido', label:'Prazo médio' },
            ].map((s,i) => (
              <div className="hero-stat" key={i}>
                <div className="stat-val">{s.val}</div>
                <div className="stat-label">{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── 6. SEM seção "Modalidades" ── */}

      {/* ── Materiais para ── */}
      <section className="section" style={{paddingTop:0}}>
        <div className="container">
          <div className="materials-cta">
            <div className="section-label anim-label">Materiais para:</div>
            <div className="materials-pills">
              {['Clubes','Atletas','Agências','Organizações','Mídia'].map(item => (
                <span key={item} className="material-pill">{item}</span>
              ))}
            </div>
          </div>
        </div>
      </section>
    </main>
  );
}

// ── Add Event Modal ──
function AddEventModal({ onClose, onAdd }) {
  const [form, setForm] = useState({
    title:'', date:'', location:'', city:'', sport:'',
    storeUrl:'', store:'Disposição', description:'', status:'available', photos:0, coverUrl:'',
  });
  const [errors, setErrors]       = useState({});
  const [dispUrl, setDispUrl]     = useState('');
  const [fetching, setFetching]   = useState(false);
  const [fetchMsg, setFetchMsg]   = useState(null); // {ok, text}
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  useEffect(() => {
    const onKey = e => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow=''; };
  }, []);

  // ── Busca dados da Disposição ──
  const fetchDisposicao = async () => {
    const url = dispUrl.trim();
    if (!url || !url.includes('disposicao.com.br')) {
      setFetchMsg({ ok:false, text:'Cole um link válido da Disposição (disposicao.com.br/…)' });
      return;
    }
    setFetching(true);
    setFetchMsg(null);
    try {
      // microlink.io busca server-side sem CORS, suporta seletores CSS customizados
      const api = `https://api.microlink.io/?url=${encodeURIComponent(url)}`
        + `&data.fotos.selector=.badge-meta&data.fotos.type=text`
        + `&data.loc.selector=span%3Ahas(.fa-map-marker-alt)&data.loc.type=text`;
      const res  = await fetch(api, { signal: AbortSignal.timeout(12000) });
      if (!res.ok) throw new Error('microlink falhou: ' + res.status);
      const json = await res.json();
      if (json.status !== 'success') throw new Error('microlink status: ' + json.status);
      const d = json.data;

      // Título
      const title = (d.title || '').trim();

      // Data: extraída da URL do CDN /galerias/YYYY-MM-DD-slug/
      let date = '';
      const cdnUrl = d.image?.url || d.logo?.url || '';
      const dateMatch = cdnUrl.match(/galerias\/(\d{4}-\d{2}-\d{2})/);
      if (dateMatch) date = dateMatch[1];

      // Quantidade de fotos: "377 fotos" → 377
      let photos = 0;
      const fotosText = d.fotos || '';
      const fotosMatch = fotosText.match(/(\d+)/);
      if (fotosMatch) photos = parseInt(fotosMatch[1]);

      // Cidade: texto do span → "Munhoz de Melo-PR" → "Munhoz de Melo, PR"
      let city = '';
      const locRaw = (d.loc || '').replace(/<[^>]+>/g, '').trim();
      if (locRaw) city = locRaw.replace(/-([A-Z]{2})$/, ', $1');

      const storeUrl = url.split('?')[0];

      setForm(f => ({
        ...f,
        title:    title    || f.title,
        date:     date     || f.date,
        city:     city     || f.city,
        photos:   photos   || f.photos,
        store:    'Disposição',
        storeUrl: storeUrl || f.storeUrl,
      }));

      const found = [
        title  && 'título',
        date   && 'data',
        city   && 'cidade',
        photos && `${photos} fotos`,
      ].filter(Boolean);
      setFetchMsg({ ok:true, text:`✓ Importado: ${found.join(', ')}` });
    } catch(err) {
      setFetchMsg({ ok:false, text:'Erro ao buscar. Verifique o link e tente novamente.' });
      console.error('fetchDisposicao:', err);
    } finally {
      setFetching(false);
    }
  };

  const [saving, setSaving] = useState(false);

  const submit = async e => {
    e.preventDefault();
    const errs = {};
    if(!form.title.trim()) errs.title = 'Título obrigatório';
    if(!form.date) errs.date = 'Data obrigatória';
    if(Object.keys(errs).length){ setErrors(errs); return; }
    setSaving(true);
    const row = {
      title:       form.title,
      date:        form.date,
      location:    form.location   || null,
      city:        form.city       || null,
      sport:       form.sport      || null,
      description: form.description|| null,
      photos:      Number(form.photos)||0,
      status:      form.status     || 'available',
      store:       form.store      || null,
      store_url:   form.storeUrl   || null,
      cover_url:   form.coverUrl   || null,
      featured:    false,
    };
    const { data, error } = await sb.from('events').insert(row).select().single();
    setSaving(false);
    if (error) { alert('Erro ao salvar: ' + error.message); return; }
    onAdd(data);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{maxWidth:560}}>
        <div className="modal-header" style={{padding:'20px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h3 style={{fontSize:'1.1rem'}}>＋ Novo Evento</h3>
          <button className="modal-close" style={{position:'static'}} onClick={onClose}><Icons.X /></button>
        </div>
        <form onSubmit={submit} noValidate>
          <div className="modal-body" style={{overflowY:'auto',maxHeight:'72vh'}}>

            {/* ── Importar da Disposição ── */}
            <div style={{
              background:'var(--bg-surface-3)',border:'1px solid var(--border-light)',
              borderRadius:'var(--radius-sm)',padding:'14px 16px',marginBottom:20,
            }}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',textTransform:'uppercase',
                letterSpacing:'0.08em',color:'var(--accent-text)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
                <span>⚡</span> Importar da Disposição
              </div>
              <div style={{display:'flex',gap:8}}>
                <input
                  type="url"
                  placeholder="https://disposicao.com.br/nome-do-evento"
                  value={dispUrl}
                  onChange={e=>setDispUrl(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),fetchDisposicao())}
                  style={{flex:1,background:'var(--bg-surface)',border:'1.5px solid var(--border)',
                    borderRadius:'var(--radius-sm)',padding:'10px 14px',color:'var(--text-primary)',
                    fontSize:'0.85rem',outline:'none'}}
                />
                <button
                  type="button"
                  onClick={fetchDisposicao}
                  disabled={fetching}
                  style={{padding:'10px 16px',borderRadius:'var(--radius-sm)',
                    background: fetching ? 'var(--bg-surface-3)' : 'rgba(255,255,255,0.08)',
                    border:'1px solid var(--accent)',color:'var(--accent-text)',
                    fontFamily:'var(--font-mono)',fontSize:'0.72rem',cursor:'pointer',
                    whiteSpace:'nowrap',minWidth:90,
                    opacity: fetching ? 0.6 : 1}}
                >{fetching ? '⏳ Buscando…' : '⚡ Importar'}</button>
              </div>
              {fetchMsg && (
                <div style={{marginTop:8,fontFamily:'var(--font-mono)',fontSize:'0.68rem',
                  color: fetchMsg.ok ? '#4ade80' : '#f87171'}}>
                  {fetchMsg.text}
                </div>
              )}
            </div>

            <div className="form-group">
              <label>Título *</label>
              <input type="text" placeholder="Ex: Maratona de Curitiba 2025" className={errors.title?'error':''} value={form.title} onChange={e=>set('title',e.target.value)} />
              {errors.title && <span className="error-msg">{errors.title}</span>}
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Data *</label>
                <input type="date" className={errors.date?'error':''} value={form.date} onChange={e=>set('date',e.target.value)} />
                {errors.date && <span className="error-msg">{errors.date}</span>}
              </div>
              <div className="form-group">
                <label>Status</label>
                <select value={form.status} onChange={e=>set('status',e.target.value)}>
                  <option value="available">Disponível</option>
                  <option value="editing">Em edição</option>
                  <option value="soon">Em breve</option>
                </select>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Local / Arena</label>
                <input type="text" placeholder="Ex: Parque do Ibirapuera" value={form.location} onChange={e=>set('location',e.target.value)} />
              </div>

// ── Events Page ──
function EventsPage({ navigate, onNotify }) {
  const { isAdmin } = useAdmin();
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [query, setQuery] = useState('');
  const [status, setStatus] = useState('all');
  const [showAddModal, setShowAddModal] = useState(false);
  const [editEvent, setEditEvent]     = useState(null);

  useEffect(() => {
    sb.from('events').select('*').order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (!error && data) setEvents(data);
        setLoading(false);
      });
  }, []);

  const deleteEvent = async id => {
    if (!window.confirm('Excluir este evento?')) return;
    const { error } = await sb.from('events').delete().eq('id', id);
    if (!error) setEvents(prev => prev.filter(ev => ev.id !== id));
  };

  const sorted = useMemo(() => [...events].sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0)), [events]);

  const filtered = useMemo(() => sorted.filter(ev => {
    const q = query.toLowerCase();
    return (!q || ev.title.toLowerCase().includes(q) || ev.city.toLowerCase().includes(q) || ev.location.toLowerCase().includes(q))
      && (status === 'all' || ev.status === status);
  }), [sorted, query, status]);

  return (
    <>
      <main>
      <div className="events-header">
        <div className="container">
          <div className="badge badge-accent anim-label" style={{marginBottom:12}}><Icons.Camera /> {loading ? '…' : events.length} eventos no acervo</div>
          <h1 className="anim-title">Encontre suas fotos</h1>
          <p className="anim-subtitle">Busque pelo evento ou filtre por status.</p>
        </div>
      </div>

      <div className="container" style={{paddingBottom:80}}>
        {/* Busca */}
        <div className="search-bar">
          <span className="search-icon"><Icons.Search /></span>
          <input type="text" placeholder="Buscar por evento, cidade ou local…" value={query} onChange={e => setQuery(e.target.value)} />
          {query && <button style={{color:'var(--text-muted)',padding:'0 4px'}} onClick={() => setQuery('')}><Icons.X /></button>}
        </div>

        {/* Chips de status */}
        <div className="filter-chips">
          {[{v:'all',l:'Todos'},{v:'available',l:'Disponíveis'},{v:'editing',l:'Em edição'},{v:'soon',l:'Em breve'}].map(s => (
            <button key={s.v} className={`chip${status===s.v?' active':''}`} onClick={() => setStatus(s.v)}>{s.l}</button>
          ))}
        </div>

        {/* Botões de administração — somente admin */}
        {isAdmin && (
          <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-sm" onClick={()=>setShowAddModal(true)}><Icons.Plus /> Adicionar Evento</button>
            <button className="btn btn-outline btn-sm"><Icons.Plus /> Adicionar Modalidade</button>
          </div>
        )}

        {/* Contador */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:8}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:'0.78rem',color:'var(--text-muted)'}}>
            {filtered.length===0?'Nenhum evento':`${filtered.length} evento${filtered.length>1?'s':''}`} encontrado{filtered.length>1?'s':''}
          </span>
          {(query||status!=='all') && (
            <button className="btn btn-ghost btn-sm" onClick={() => {setQuery('');setStatus('all');}}>Limpar filtros</button>
          )}
        </div>

        {filtered.length===0 ? (
          <div className="empty-state"><div className="empty-icon">🔍</div><h3>Nenhum evento encontrado</h3><p>Tente outros termos ou limpe os filtros.</p></div>
        ) : (
          <div className="events-grid">
            {filtered.map(ev => <EventCard key={ev.id} event={ev} onNotify={onNotify} onDelete={deleteEvent}
              onUpdate={updated => setEvents(prev => prev.map(e => e.id===updated.id ? updated : e))}
              onOpenDetail={ev => navigate('event:'+ev.id)}
              onOpenEdit={ev => setEditEvent(ev)} />)}
          </div>
        )}
      </div>
      </main>
      {showAddModal && (
        <AddEventModal
          onClose={() => setShowAddModal(false)}
          onAdd={ev => { setEvents(prev => [ev, ...prev]); setShowAddModal(false); setEditEvent(ev); }}
        />
      )}
      {editEvent && (
        <EditEventModal
          event={editEvent}
          onClose={() => setEditEvent(null)}
          onSave={updated => {
            setEvents(prev => prev.map(e => e.id===updated.id ? updated : e));
            setEditEvent(null);
          }}
        />
      )}
    </>
  );
}

// ── Portfolio Page ──
function PortfolioPage() {
  const { isAdmin } = useAdmin();
  const [items, setItems]         = useState([]);
  const [loadingPortfolio, setLoadingPortfolio] = useState(true);
  const [lightbox, setLightbox]     = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [openMenuId, setOpenMenuId]   = useState(null);
  const [dragOverId, setDragOverId]   = useState(null);
  const dragId = useRef(null);
  const uploadRefs = useRef({});

  useEffect(() => {
    sb.from('portfolio').select('*').order('sort_order', { ascending: true }).order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (!error && data) setItems(data);
        setLoadingPortfolio(false);
      });
  }, []);

  const reorderItems = async (fromId, toId) => {
    if (fromId === toId) return;
    setItems(prev => {
      const arr   = [...prev];
      const fromI = arr.findIndex(i => i.id === fromId);
      const toI   = arr.findIndex(i => i.id === toId);
      if (fromI < 0 || toI < 0) return prev;
      const [moved] = arr.splice(fromI, 1);
      arr.splice(toI, 0, moved);
      // Persiste sort_order no Supabase
      arr.forEach((item, idx) => {
        sb.from('portfolio').update({ sort_order: idx }).eq('id', item.id);
      });
      return arr;
    });
  };

  const nav = dir => setLightbox(i => (i+dir+items.length)%items.length);

  const deleteItem = async id => {
    if (!window.confirm('Excluir esta foto do portfólio?')) return;
    const { error } = await sb.from('portfolio').delete().eq('id', id);
    if (!error) { setItems(prev => prev.filter(i => i.id !== id)); setLightbox(null); }
  };

  const saveItem = async updated => {
    const { id, created_at, ...fields } = updated;
    const { data, error } = await sb.from('portfolio').update(fields).eq('id', id).select().single();
    if (!error && data) setItems(prev => prev.map(i => i.id === data.id ? data : i));
    setEditingItem(null);
  };

  const addItem = async () => {
    const row = { title:'Nova foto', sport:'Corrida', size:'normal' };
    const { data, error } = await sb.from('portfolio').insert(row).select().single();
    if (!error && data) setItems(prev => [data, ...prev]);
  };

  // Fecha menu ao clicar fora
  useEffect(() => {
    if (!openMenuId) return;
    const close = () => setOpenMenuId(null);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [openMenuId]);

  return (
    <main>
      <div className="portfolio-header">
        <div className="container">
          <div className="badge badge-accent anim-label" style={{marginBottom:12}}><Icons.Image /> {loadingPortfolio ? '…' : items.length} fotos no portfólio</div>
          <h1 className="anim-title">Portfólio</h1>
          <p className="anim-subtitle" style={{color:'var(--text-secondary)',fontSize:'1.05rem'}}>
            Uma seleção dos melhores momentos capturados em campo.
          </p>
        </div>
      </div>

      <div className="container" style={{paddingBottom:80}}>
        {isAdmin && (
          <div style={{display:'flex',gap:12,marginBottom:32,flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-sm" onClick={addItem}><Icons.Plus /> Adicionar Foto</button>
          </div>
        )}

        <div className="masonry-grid">
          {items.map((item,idx) => (
            <div key={item.id} className="masonry-item"
              style={{position:'relative', opacity: dragOverId===item.id ? 0.4 : 1, transition:'opacity 0.15s',
                outline: dragOverId===item.id ? '2px dashed var(--accent)' : 'none'}}
              onClick={() => { setOpenMenuId(null); setLightbox(idx); }}
              onDragOver={isAdmin ? e => { e.preventDefault(); setDragOverId(item.id); } : undefined}
              onDragLeave={isAdmin ? () => setDragOverId(null) : undefined}
              onDrop={isAdmin ? e => { e.preventDefault(); setDragOverId(null); reorderItems(dragId.current, item.id); dragId.current = null; } : undefined}
            >
              {/* Alça de arrasto — somente admin */}
              {isAdmin && (
                <div
                  draggable={true}
                  onDragStart={e => { e.stopPropagation(); dragId.current = item.id; }}
                  onDragEnd={() => { setDragOverId(null); dragId.current = null; }}
                  onClick={e => e.stopPropagation()}
                  title="Arrastar para reordenar"
                  style={{
                    position:'absolute', top:8, left:44, zIndex:25,
                    width:28, height:28, borderRadius:'50%',
                    background:'rgba(20,20,20,0.85)', border:'1px solid rgba(255,255,255,0.2)',
                    color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
                    cursor:'grab', fontSize:'14px', userSelect:'none',
                  }}
                >⠿</div>
              )}
              <CropableImage
                sport={item.sport} label={item.title}
                aspectRatio={SIZE_RATIO[item.size]||'4/3'}
                externalInputRef={{ current: null, set: el => { if (uploadRefs.current) uploadRefs.current[item.id] = el; } }}
                initialSrc={item.image_url}
                initialPosX={item.image_pos_x} initialPosY={item.image_pos_y} initialScale={item.image_scale}
                onSave={async (url, px, py, sc) => {
                  const { data, error } = await sb.from('portfolio').update({ image_url: url, image_pos_x: px, image_pos_y: py, image_scale: sc }).eq('id', item.id).select().single();
                  if (error) { console.error('Portfolio onSave error:', error); alert('Erro ao salvar: ' + error.message); return; }
                  if (data) setItems(prev => prev.map(i => i.id === data.id ? data : i));
                }}
              />

              {/* Overlay modalidade */}
              <div className="item-overlay" style={{pointerEvents:'none'}}>
                <div className="item-overlay-content">
                  <span className="item-sport">{item.sport}</span>
                </div>
              </div>

              {/* ── Botão menu (⋮) — somente admin ── */}
              {isAdmin && <div style={{position:'absolute',top:8,left:8,zIndex:20}} onClick={e=>e.stopPropagation()}>
                <button
                  className="item-edit-btn"
                  style={{right:'auto',position:'relative',top:'auto',left:'auto',opacity:1,width:32,height:32}}
                  onClick={e=>{e.stopPropagation(); setOpenMenuId(v => v===item.id ? null : item.id);}}
                  title="Opções"
                >⋮</button>

                {openMenuId === item.id && (
                  <div style={{
                    position:'absolute',top:'calc(100% + 4px)',left:0,
                    background:'var(--bg-surface)',border:'1px solid var(--border-light)',
                    borderRadius:'var(--radius-sm)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)',
                    minWidth:170,overflow:'hidden',zIndex:30,
                  }}>
                    {[
                      { label:'✏️ Editar informações', action: () => { setEditingItem(item); setOpenMenuId(null); } },
                      { label:'📁 Trocar foto',         action: () => { const r = uploadRefs.current[item.id]; if(r) r.click(); setOpenMenuId(null); } },
                      { label:'🗑 Excluir card',        action: () => { setOpenMenuId(null); deleteItem(item.id); }, red: true },
                    ].map(opt => (
                      <button key={opt.label}
                        style={{
                          display:'block',width:'100%',textAlign:'left',padding:'10px 14px',
                          background:'none',border:'none',
                          fontFamily:'var(--font-mono)',fontSize:'0.72rem',
                          color: opt.red ? '#f87171' : 'var(--text-secondary)',
                          cursor:'pointer',borderBottom:'1px solid var(--border)',
                        }}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--bg-surface-3)'}
                        onMouseLeave={e=>e.currentTarget.style.background='none'}
                        onClick={e=>{e.stopPropagation();opt.action();}}
                      >{opt.label}</button>
                    ))}
                  </div>
                )}
              </div>}

              {/* Botão excluir rápido — somente admin */}
              {isAdmin && <button
                onClick={e=>{e.stopPropagation();deleteItem(item.id);}}
                title="Excluir"
                style={{position:'absolute',top:8,right:8,zIndex:10,width:28,height:28,
                  borderRadius:'50%',background:'rgba(239,68,68,0.85)',border:'none',
                  color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',
                  cursor:'pointer',opacity:0,transition:'opacity 0.2s'}}
                className="item-delete-btn"
              ><Icons.X /></button>}
            </div>
          ))}
        </div>
      </div>

      {lightbox!==null && <Lightbox items={items} index={lightbox} onClose={() => setLightbox(null)} onNavigate={nav} />}
      {editingItem && <EditPortfolioItemModal item={editingItem} onSave={saveItem} onClose={() => setEditingItem(null)} />}
    </main>
  );
}

          <p className="anim-subtitle" style={{color:'var(--text-secondary)',fontSize:'1.05rem'}}>Cobertura fotográfica completa para seu evento esportivo.</p>
        </div>
      </div>

      <div className="container" style={{paddingBottom:80}}>
        <div className="hire-layout">
          {/* Sidebar de contato */}
          <div className="hire-sidebar">
            <h3>Contato direto</h3>
            {/* 2. Botões estilizados WA + IG */}
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:8}}>
              <a className="social-btn social-btn-wa" href="https://wa.me/5544991586105" target="_blank" rel="noopener">
                <Icons.WhatsApp /><span style={{fontWeight:800,letterSpacing:'0.06em'}}>WHATSAPP</span>
              </a>
              <a className="social-btn social-btn-ig" href="https://www.instagram.com/dmfotoesporte/" target="_blank" rel="noopener">
                <Icons.Instagram /><span style={{fontWeight:800,letterSpacing:'0.06em'}}>INSTAGRAM</span>
              </a>
            </div>

            <div style={{borderTop:'1px solid var(--border)',marginTop:20,paddingTop:20}}>
              <div className="section-label" style={{marginBottom:8}}>O que inclui</div>
              <ul className="includes-list">
                {includes.map(item => <li key={item}><Icons.Check />{item}</li>)}
              </ul>
            </div>
          </div>

          {/* Formulário */}
          <div className="hire-form">
            {done ? (
              <div className="success-state" style={{padding:'48px 24px'}}>
                <div className="success-icon"><Icons.Check /></div>
                <h3>Mensagem enviada!</h3>
                <p>Obrigado pelo contato, <strong>{form.name}</strong>!<br />Retornarei em até 24h para alinharmos os detalhes da cobertura.</p>
                <button className="btn btn-outline" style={{margin:'20px auto 0',display:'flex'}}
                  onClick={()=>{setDone(false);setForm({name:'',email:'',phone:'',type:'',date:'',message:''});}}>
                  Enviar outra mensagem
                </button>
              </div>
            ) : (
              <>
                <h2>Solicitar orçamento</h2>
                <p className="form-note">* campos obrigatórios</p>
                <form onSubmit={submit} noValidate>
                  <div className="form-row">
                    <div className="form-group">
                      <label>Nome *</label>
                      <input type="text" placeholder="Seu nome" className={errors.name?'error':''} value={form.name} onChange={e=>set('name',e.target.value)} />
                      {errors.name && <span className="error-msg">{errors.name}</span>}
                    </div>
                    <div className="form-group">
                      <label>E-mail *</label>
                      <input type="email" placeholder="seu@email.com" className={errors.email?'error':''} value={form.email} onChange={e=>set('email',e.target.value)} />
                      {errors.email && <span className="error-msg">{errors.email}</span>}
                    </div>
                  </div>
                  <div className="form-row">
                    <div className="form-group">
                      <label>Telefone</label>
                      <input type="tel" placeholder="(44) 9 0000-0000" value={form.phone} onChange={e=>set('phone',e.target.value)} />
                    </div>
                    <div className="form-group">
                      <label>Data do evento</label>
                      <input type="date" value={form.date} onChange={e=>set('date',e.target.value)} />
                    </div>
                  </div>
                  <div className="form-group">
                    <label>Tipo de evento</label>
                    <select value={form.type} onChange={e=>set('type',e.target.value)}>
                      <option value="">Selecione a modalidade</option>
                      {Object.keys(SPORT_COLORS).map(s=><option key={s} value={s}>{s}</option>)}
                      <option value="Outro">Outro</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Mensagem *</label>
                    <textarea placeholder="Conte um pouco sobre o evento: local, número de participantes, necessidades específicas…"
                      className={errors.message?'error':''} value={form.message} onChange={e=>set('message',e.target.value)} />
                    {errors.message && <span className="error-msg">{errors.message}</span>}
                  </div>
                  <button type="submit" className="btn btn-primary btn-lg" disabled={loading} style={{width:'100%',justifyContent:'center'}}>
                    {loading ? <span className="btn-spinner"><span className="spinner" /> Enviando…</span> : <><Icons.ArrowRight /> Enviar mensagem</>}
                  </button>
                </form>
              </>
            )}
          </div>
        </div>
      </div>
    </main>
  );
}

// EVENT DETAIL PAGE
// ════════════════════════════════════════════════════════════════
function EventDetailPage({ navigate, eventId, onNotify }) {
  const [event, setEvent]   = useState(null);
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Carrega evento
    sb.from('events').select('*').eq('id', eventId).single()
      .then(({ data }) => { if (data) setEvent(data); setLoading(false); });
    // Carrega fotos
    sb.from('event_photos').select('*').eq('event_id', eventId).order('position')
      .then(({ data }) => { if (data) setPhotos(data); });
  }, [eventId]);

  if (loading) return (
    <main style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:'0.8rem',color:'var(--text-muted)'}}>Carregando…</span>
    </main>
  );

  if (!event) return (
    <main style={{minHeight:'60vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontFamily:'var(--font-mono)',fontSize:'0.8rem',color:'var(--text-muted)'}}>Evento não encontrado.</span>
    </main>
  );

  const statusMap = { available:{cls:'badge-available',label:'Fotos disponíveis'}, editing:{cls:'badge-editing',label:'Em edição'}, soon:{cls:'badge-soon',label:'Em breve'} };
  const st = statusMap[event.status] || statusMap.soon;
  const dateStr = event.date ? new Date(event.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}) : '';

  return (
    <main>
      {/* Hero / capa */}
      <div style={{position:'relative',width:'100%',height:'55vw',maxHeight:560,minHeight:280,overflow:'hidden',background:'var(--bg-surface-2)'}}>
        {event.cover_url && (
          <img src={event.cover_url} loading="lazy" style={{
            position:'absolute',inset:0,width:'100%',height:'100%',
            objectFit:'cover',objectPosition:`${event.cover_pos_x??50}% ${event.cover_pos_y??50}%`,
          }} />
        )}
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(8,8,8,0.85))'}} />
        <div className="container" style={{position:'relative',zIndex:1,height:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end',paddingBottom:32}}>
          <button onClick={() => navigate('events')} style={{
            display:'inline-flex',alignItems:'center',gap:6,marginBottom:16,
            background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',
            borderRadius:20,padding:'6px 14px',color:'#fff',cursor:'pointer',
            fontFamily:'var(--font-mono)',fontSize:'0.68rem',letterSpacing:'0.06em',width:'fit-content'
          }}>← Voltar para eventos</button>
          <span className={`badge ${st.cls}`} style={{marginBottom:10,display:'inline-flex',width:'fit-content'}}><Dot />{st.label}</span>
          <h1 style={{fontFamily:'var(--font-condensed)',fontStyle:'italic',fontWeight:900,
            fontSize:'clamp(1.8rem,4vw,2.8rem)',textTransform:'uppercase',color:'#fff',
            letterSpacing:'.02em',margin:0}}>
            {event.title}
          </h1>
        </div>
      </div>

      <div className="container" style={{paddingTop:40,paddingBottom:80}}>
        <div className="event-detail-info" style={{display:'flex',flexDirection:'row',flexWrap:'wrap',gap:16,alignItems:'flex-start',marginBottom:32,justifyContent:'space-between'}}>
          {/* Infos */}
          <div style={{display:'flex',flexWrap:'wrap',gap:12,alignItems:'center'}}>
            {dateStr && <div style={{display:'flex',alignItems:'center',gap:6,color:'var(--text-secondary)',fontSize:'0.9rem'}}><Icons.Calendar />{dateStr}</div>}
            {(event.location||event.city) && <div style={{display:'flex',alignItems:'center',gap:6,color:'var(--text-secondary)',fontSize:'0.9rem'}}><Icons.Pin />{[event.location,event.city].filter(Boolean).join(' · ')}</div>}
            {event.sport && <span className="tag">{event.sport}</span>}
            {event.photos > 0 && <span style={{color:'var(--text-secondary)',fontSize:'0.9rem',display:'flex',alignItems:'center',gap:4}}><Icons.Image />{event.photos.toLocaleString('pt-BR')} fotos</span>}
          </div>
          {/* CTA */}
          {event.status === 'available' && event.store_url && (
            <div className="event-detail-cta">
              <a href={event.store_url} target="_blank" rel="noopener"
                style={{display:'inline-flex',alignItems:'center',gap:8,padding:'12px 24px',
                  borderRadius:'var(--radius-sm)',background:'#fff',color:'#080808',
                  fontWeight:900,fontSize:'0.85rem',letterSpacing:'.06em',
                  textTransform:'uppercase',textDecoration:'none',whiteSpace:'nowrap'}}>
                🛒 Comprar minhas fotos <Icons.ExternalLink />
              </a>
            </div>
          )}
        </div>

        {event.description && (
          <p style={{color:'var(--text-secondary)',fontSize:'0.95rem',lineHeight:1.7,marginBottom:32,maxWidth:640}}>
            {event.description}
          </p>
        )}

        {/* Fotos */}
        {photos.length > 0 ? (
          <>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',textTransform:'uppercase',
              letterSpacing:'0.08em',color:'var(--text-muted)',marginBottom:16}}>
              {photos.length} foto{photos.length>1?'s':''} do evento
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12}}>
              {photos.map(p => (
                <div key={p.id} style={{aspectRatio:'3/4',borderRadius:'var(--radius-sm)',overflow:'hidden',background:'var(--bg-surface-2)'}}>
                  <img src={p.image_url} loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover',
                    transform:`scale(${p.scale||1}) translate(${(50-(p.pos_x??50))*0.5}%,${(50-(p.pos_y??50))*0.5}%)`,
                    transformOrigin:'center center'}} />
                </div>
              ))}
            </div>
          </>
        ) : (
          <div style={{textAlign:'center',padding:'60px 0',color:'var(--text-muted)',
            fontFamily:'var(--font-mono)',fontSize:'0.78rem',border:'1px dashed var(--border)',borderRadius:'var(--radius-sm)'}}>
            Fotos em breve
          </div>
        )}

        {/* CTA mobile */}
        {event.status === 'available' && event.store_url && (
          <div style={{marginTop:40}}>
            <a href={event.store_url} target="_blank" rel="noopener"
              style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                padding:'16px',borderRadius:'var(--radius-sm)',background:'#fff',color:'#080808',
                fontWeight:900,fontSize:'0.9rem',letterSpacing:'.06em',
                textTransform:'uppercase',textDecoration:'none'}}>
              🛒 Comprar minhas fotos <Icons.ExternalLink />
            </a>
          </div>
        )}

        {event.status !== 'available' && (
          <div style={{marginTop:40}}>
            <button onClick={() => onNotify(event)}
              style={{width:'100%',padding:'16px',borderRadius:'var(--radius-sm)',
                background:'var(--bg-surface-2)',border:'1px solid var(--border-light)',
                color:'var(--text-primary)',cursor:'pointer',display:'flex',
                alignItems:'center',justifyContent:'center',gap:8,fontSize:'0.9rem',fontWeight:600}}>
              <Icons.Bell /> Avise-me quando disponível
            </button>
          </div>
        )}
      </div>
    </main>
  );
}

// APP
// ════════════════════════════════════════════════════════════════
function App() {
  const [page, setPage]         = useState('home');
  const [notifyModal, setNotify]= useState(null);
  const [isAdmin, setIsAdmin]   = useState(false);
  const [showLogin, setShowLogin]= useState(false);

  const navigate = id => { setPage(id); window.scrollTo({top:0,behavior:'smooth'}); };
  const p = { navigate };

  // Verifica sessão Supabase ao carregar e escuta mudanças de auth
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setIsAdmin(!!session);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setIsAdmin(!!session);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Atalho de teclado Ctrl+Shift+A
  useEffect(() => {
    const onKey = e => {
      if (e.ctrlKey && e.shiftKey && e.key === 'A') { e.preventDefault(); setShowLogin(true); }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  const adminCtx = {
    isAdmin,
    openLogin: () => setShowLogin(true),
    logout: () => sb.auth.signOut(),
  };

  const renderPage = () => {
    if (page && page.startsWith('event:')) {
      const eventId = page.replace('event:', '');
      return <EventDetailPage {...p} eventId={eventId} onNotify={setNotify} />;
    }
    switch(page) {
      case 'home':      return <HomePage      {...p} onNotify={setNotify} />;
      case 'events':    return <EventsPage    {...p} onNotify={setNotify} />;
      case 'portfolio': return <PortfolioPage {...p} />;
      case 'about':     return <AboutPage     {...p} />;
      case 'hire':      return <HirePage      {...p} />;
      default:          return <HomePage      {...p} onNotify={setNotify} />;
    }
  };

  return (
    <AdminCtx.Provider value={adminCtx}>
      <Navbar page={page} navigate={navigate} />
      {renderPage()}
      <Footer navigate={navigate} />
      <TweaksPanel />
      {notifyModal && <NotifyModal event={notifyModal} onClose={() => setNotify(null)} />}
      {showLogin && (
        <AdminLoginModal
          onClose={() => setShowLogin(false)}
          onSuccess={() => { setIsAdmin(true); setShowLogin(false); }}
        />
      )}
    </AdminCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
